// ─── Connectors Practice ─────────────────────────────────────────────────────
function ConnectorsPractice() {
  const stats = useStats();
  const [activeCat, setActiveCat] = useState(null);
  const [mode, setMode] = useState("browse"); // browse, recall, type
  const filtered = activeCat ? CONNECTORS.filter(c => c.cat === activeCat) : CONNECTORS;

  // Recall mode state
  const [recallIndex, setRecallIndex] = useState(0);
  const [recallFlipped, setRecallFlipped] = useState(false);
  const [recallScore, setRecallScore] = useState({ yes: 0, no: 0 });

  const recallPool = useMemo(() => {
    const list = [...filtered];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeCat, mode]);

  const recallDone = recallScore.yes + recallScore.no >= recallPool.length;

  useEffect(() => {
    if (recallDone && mode === "recall" && recallPool.length > 0) stats.record("phrases", "recall", recallScore.yes, recallPool.length, "connectors");
  }, [recallDone]);

  const recallMark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setRecallScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
    setRecallFlipped(false);
    if (recallIndex + 1 < recallPool.length) setRecallIndex(recallIndex + 1);
  };

  // Keyboard shortcuts for recall
  useEffect(() => {
    if (mode !== "recall" || recallDone) return;
    const handler = (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); setRecallFlipped(f => !f); SFX.flip(); }
      if (recallFlipped && (e.key === "1" || e.key === "ArrowLeft")) recallMark(false);
      if (recallFlipped && (e.key === "2" || e.key === "ArrowRight")) recallMark(true);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [mode, recallDone, recallFlipped, recallIndex]);

  // Type mode state
  const [typeAnswers, setTypeAnswers] = useState({});
  const [typeSubmitted, setTypeSubmitted] = useState(false);
  const typePool = useMemo(() => {
    const list = [...filtered];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeCat, mode]);
  const normalize = (s) => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");
  const typeScore = typeSubmitted ? typePool.filter((c, i) => normalize(typeAnswers[i] || "") === normalize(c.fr)).length : 0;

  useEffect(() => {
    if (typeSubmitted && typePool.length > 0) stats.record("phrases", "type", typeScore, typePool.length, "connectors");
  }, [typeSubmitted]);

  return (
    <div>
      <div style={{
        padding: "14px 16px", borderRadius: 10, marginBottom: 16,
        background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
          Master these <span style={{ color: "#a5b4fc", fontWeight: 600 }}>discourse markers</span> to sound fluent in your oral. Examiners specifically reward linking words and fillers that show range.
        </div>
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 4, marginBottom: 12, flexWrap: "wrap" }}>
        <button onClick={() => setActiveCat(null)} style={{
          padding: "6px 12px", borderRadius: 8, border: !activeCat ? "1.5px solid #6366f1" : "1.5px solid rgba(51,65,85,0.4)",
          background: !activeCat ? "rgba(99,102,241,0.1)" : "#111827", color: !activeCat ? "#a5b4fc" : "#64748b",
          fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, cursor: "pointer",
        }}>All ({CONNECTORS.length})</button>
        {CONNECTOR_CATS.map(c => {
          const count = CONNECTORS.filter(cn => cn.cat === c.id).length;
          return (
            <button key={c.id} onClick={() => setActiveCat(c.id)} style={{
              padding: "6px 12px", borderRadius: 8, cursor: "pointer",
              border: activeCat === c.id ? `1.5px solid ${c.color}` : "1.5px solid rgba(51,65,85,0.4)",
              background: activeCat === c.id ? `${c.color}15` : "#111827",
              color: activeCat === c.id ? c.color : "#64748b",
              fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700,
            }}>{c.label} ({count})</button>
          );
        })}
      </div>

      {/* Mode selector */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {[{ id: "browse", label: "📖 Browse" }, { id: "recall", label: "🧠 Recall" }, { id: "type", label: "✏️ Type It" }].map(m => (
          <button key={m.id} onClick={() => { setMode(m.id); setRecallIndex(0); setRecallFlipped(false); setRecallScore({ yes: 0, no: 0 }); setTypeAnswers({}); setTypeSubmitted(false); }} style={{
            flex: 1, padding: "10px 6px", borderRadius: 10, cursor: "pointer", textAlign: "center",
            border: mode === m.id ? "1.5px solid #6366f1" : "1.5px solid rgba(51,65,85,0.4)",
            background: mode === m.id ? "rgba(99,102,241,0.1)" : "#111827",
            color: mode === m.id ? "#a5b4fc" : "#64748b",
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700,
          }}>{m.label}</button>
        ))}
      </div>

      {/* Browse */}
      {mode === "browse" && filtered.map((c, i) => {
        const catMeta = CONNECTOR_CATS.find(cc => cc.id === c.cat);
        return (
          <div key={i} style={{
            padding: "12px 16px", borderRadius: 10, marginBottom: 8,
            background: "#111827", border: "1px solid rgba(51,65,85,0.4)",
            borderLeft: `3px solid ${catMeta?.color || "#6366f1"}`,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 15, fontWeight: 700, color: catMeta?.color || "#a5b4fc" }}>{c.fr}</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{c.en}</span>
            </div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", fontStyle: "italic", marginTop: 6 }}>{c.example}</div>
          </div>
        );
      })}

      {/* Recall */}
      {mode === "recall" && !recallDone && recallPool[recallIndex] && (
        <div>
          <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
            <div style={{ flex: recallScore.yes, height: 4, borderRadius: 2, background: "#34d399", transition: "flex 0.3s" }} />
            <div style={{ flex: recallScore.no, height: 4, borderRadius: 2, background: "#f87171", transition: "flex 0.3s" }} />
            <div style={{ flex: Math.max(0, recallPool.length - recallScore.yes - recallScore.no), height: 4, borderRadius: 2, background: "#1e293b" }} />
          </div>
          <div onClick={() => { setRecallFlipped(!recallFlipped); SFX.flip(); }} style={{
            minHeight: 160, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
            padding: "32px 24px", borderRadius: 16, cursor: "pointer", textAlign: "center", transition: "all 0.3s",
            background: recallFlipped ? "rgba(99,102,241,0.06)" : "linear-gradient(145deg, #1e293b, #111827)",
            border: `1.5px solid ${recallFlipped ? "rgba(99,102,241,0.3)" : "rgba(51,65,85,0.5)"}`,
          }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: "#64748b", marginBottom: 14 }}>
              {recallFlipped ? "Français" : "English"} · {recallIndex + 1}/{recallPool.length}
            </div>
            <div style={{ fontSize: recallFlipped ? 20 : 16, fontWeight: 700, color: recallFlipped ? "#a5b4fc" : "#e2e8f0" }}>
              {recallFlipped ? recallPool[recallIndex].fr : recallPool[recallIndex].en}
            </div>
            {recallFlipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#475569", fontStyle: "italic", marginTop: 10 }}>{recallPool[recallIndex].example}</div>}
            {!recallFlipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#475569", marginTop: 12 }}>Space to flip · 1/2 to answer</div>}
          </div>
          {recallFlipped && (
            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <button onClick={() => recallMark(false)} style={{ flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(239,68,68,0.4)", background: "#111827", color: "#f87171", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✗ Didn't know (1)</button>
              <button onClick={() => recallMark(true)} style={{ flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(52,211,153,0.4)", background: "#111827", color: "#34d399", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✓ Knew it (2)</button>
            </div>
          )}
        </div>
      )}
      {mode === "recall" && recallDone && (
        <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>{recallScore.yes >= recallScore.no ? "🎉" : "💪"}</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#e2e8f0" }}>{recallScore.yes}/{recallPool.length}</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>connectors recalled</div>
          <button onClick={() => { setRecallIndex(0); setRecallFlipped(false); setRecallScore({ yes: 0, no: 0 }); }} style={{
            padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
            fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
          }}>Try Again</button>
        </div>
      )}

      {/* Type It */}
      {mode === "type" && (
        <div>
          {typePool.map((c, i) => {
            const isCorrect = typeSubmitted && normalize(typeAnswers[i] || "") === normalize(c.fr);
            const isWrong = typeSubmitted && !isCorrect;
            return (
              <div key={i} style={{
                padding: "12px 16px", borderRadius: 10, marginBottom: 8,
                background: typeSubmitted ? (isCorrect ? "rgba(52,211,153,0.06)" : "rgba(239,68,68,0.06)") : "#111827",
                border: `1px solid ${typeSubmitted ? (isCorrect ? "rgba(52,211,153,0.3)" : "rgba(239,68,68,0.3)") : "rgba(51,65,85,0.4)"}`,
              }}>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#cbd5e1", marginBottom: 6 }}>{c.en}</div>
                <input value={typeAnswers[i] || ""} onChange={e => setTypeAnswers(p => ({ ...p, [i]: e.target.value }))}
                  disabled={typeSubmitted} placeholder="Type the French…"
                  style={{
                    width: "100%", padding: "8px 12px", borderRadius: 6, boxSizing: "border-box",
                    border: `1px solid ${typeSubmitted ? (isCorrect ? "#34d399" : "#ef4444") : "rgba(99,102,241,0.2)"}`,
                    background: "rgba(0,0,0,0.2)", color: "#e2e8f0", fontSize: 14, fontFamily: "'Libre Baskerville', serif", outline: "none",
                  }} />
                {isWrong && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#f87171", marginTop: 4 }}>→ <strong style={{ color: "#34d399" }}>{c.fr}</strong></div>}
              </div>
            );
          })}
          {!typeSubmitted ? (
            <button onClick={() => setTypeSubmitted(true)} style={{
              width: "100%", padding: "14px", borderRadius: 10, border: "none", marginTop: 8, cursor: "pointer",
              background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
              fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
            }}>Check Answers</button>
          ) : (
            <div style={{ textAlign: "center", padding: "16px", borderRadius: 10, background: "rgba(99,102,241,0.06)", border: "1px solid rgba(99,102,241,0.2)", marginTop: 8 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: typeScore === typePool.length ? "#34d399" : "#a5b4fc" }}>{typeScore}/{typePool.length}</div>
              <button onClick={() => { setTypeAnswers({}); setTypeSubmitted(false); }} style={{
                width: "100%", padding: "12px", borderRadius: 10, border: "1.5px solid rgba(99,102,241,0.3)",
                background: "transparent", color: "#a5b4fc", marginTop: 10, cursor: "pointer",
                fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
              }}>New Round</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ─── Mock Exam Mode ──────────────────────────────────────────────────────────
function MockExam() {
  // Phases: idle, prep, presentation, followup, conversation, done
  const [phase, setPhase] = useState("idle");
  const [image, setImage] = useState(null);
  const [timeLeft, setTimeLeft] = useState(0);
  const [totalPhaseTime, setTotalPhaseTime] = useState(0);
  const intervalRef = useRef(null);
  const containerRef = useRef(null);
  const [isFullscreen, setIsFullscreen] = useState(false);

  // Fullscreen toggle
  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      containerRef.current?.requestFullscreen?.().catch(() => {});
    } else {
      document.exitFullscreen?.().catch(() => {});
    }
  };
  useEffect(() => {
    const handler = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", handler);
    return () => document.removeEventListener("fullscreenchange", handler);
  }, []);

  // Question state for follow-up and conversation
  const [currentQ, setCurrentQ] = useState(null);
  const [questionsUsed, setQuestionsUsed] = useState(0);
  const [showEn, setShowEn] = useState(false);

  const PHASES = {
    prep: { label: "Preparation", duration: 15 * 60, color: "#6366f1", icon: "📝", desc: "Study the image and prepare your notes" },
    presentation: { label: "Presentation", duration: 2 * 60, color: "#10b981", icon: "🎤", desc: "Describe and analyze the image" },
    followup: { label: "Follow-up Questions", duration: 3 * 60, color: "#f59e0b", icon: "❓", desc: "Answer questions about the image" },
    conversation: { label: "General Conversation", duration: 5 * 60, color: "#ec4899", icon: "💬", desc: "Discuss broader topics" },
  };

  // Timer
  useEffect(() => {
    if (phase === "idle" || phase === "done") return;
    if (timeLeft <= 0) {
      // Auto advance
      SFX.alarm();
      clearInterval(intervalRef.current);
      const order = ["prep", "presentation", "followup", "conversation"];
      const idx = order.indexOf(phase);
      if (idx < order.length - 1) {
        startPhase(order[idx + 1]);
      } else {
        SFX.complete();
        setPhase("done");
      }
      return;
    }
    intervalRef.current = setInterval(() => setTimeLeft(t => t - 1), 1000);
    return () => clearInterval(intervalRef.current);
  }, [phase, timeLeft]);

  const startPhase = (p) => {
    SFX.phase();
    const dur = PHASES[p].duration;
    setPhase(p);
    setTimeLeft(dur);
    setTotalPhaseTime(dur);
    setQuestionsUsed(0);
    setShowEn(false);
    if (p === "followup") {
      pickFollowUpQuestion(image, 0);
    } else if (p === "conversation") {
      pickConversationQuestion(0);
    } else {
      setCurrentQ(null);
    }
  };

  const pickFollowUpQuestion = (img, used) => {
    const theme = img?.theme || "identities";
    const pool = FOLLOW_UP_QUESTIONS[theme] || FOLLOW_UP_QUESTIONS.identities;
    if (used < pool.length) {
      setCurrentQ({ fr: pool[used], en: "" });
      setShowEn(false);
    }
  };

  const pickConversationQuestion = (used) => {
    // Pool from all TEACHER_QUESTIONS themes, shuffled
    const allQs = Object.values(TEACHER_QUESTIONS).flatMap(t => t.questions);
    // Simple shuffle by seed
    const shuffled = [...allQs];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    if (used < shuffled.length) {
      setCurrentQ(shuffled[used]);
      setShowEn(false);
    }
  };

  const nextQuestion = () => {
    const next = questionsUsed + 1;
    setQuestionsUsed(next);
    if (phase === "followup") pickFollowUpQuestion(image, next);
    else if (phase === "conversation") pickConversationQuestion(next);
  };

  const startExam = () => {
    const img = MOCK_EXAM_IMAGES[Math.floor(Math.random() * MOCK_EXAM_IMAGES.length)];
    setImage(img);
    startPhase("prep");
  };

  const skipToNext = () => {
    clearInterval(intervalRef.current);
    const order = ["prep", "presentation", "followup", "conversation"];
    const idx = order.indexOf(phase);
    if (idx < order.length - 1) startPhase(order[idx + 1]);
    else setPhase("done");
  };

  const abort = () => {
    clearInterval(intervalRef.current);
    setPhase("idle");
    setImage(null);
    setCurrentQ(null);
  };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const pct = totalPhaseTime > 0 ? (timeLeft / totalPhaseTime) * 100 : 0;
  const phaseInfo = PHASES[phase] || {};
  const urgentColor = timeLeft <= 30 ? "#ef4444" : timeLeft <= 60 ? "#f59e0b" : (phaseInfo.color || "#6366f1");

  // Fullscreen button component
  const FullscreenBtn = () => (
    <button onClick={toggleFullscreen} title={isFullscreen ? "Exit fullscreen" : "Enter fullscreen"} style={{
      padding: "6px 12px", borderRadius: 8, border: "1px solid rgba(99,102,241,0.3)",
      background: isFullscreen ? "rgba(99,102,241,0.15)" : "rgba(99,102,241,0.05)",
      color: "#a5b4fc", cursor: "pointer",
      fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700,
      display: "flex", alignItems: "center", gap: 4,
    }}>{isFullscreen ? "⛶ Exit" : "⛶ Fullscreen"}</button>
  );

  return (
    <div ref={containerRef} style={{
      ...(isFullscreen ? {
        background: "#0c0f1a", padding: "16px 24px",
        display: "flex", flexDirection: "column", height: "100vh", width: "100vw",
        maxWidth: "100%", boxSizing: "border-box", overflow: "hidden",
      } : {}),
    }}>
    <div style={isFullscreen ? { maxWidth: 720, width: "100%", margin: "0 auto", display: "flex", flexDirection: "column", flex: 1, minHeight: 0 } : {}}>

    {/* Idle screen */}
    {phase === "idle" && (
    <div>
      <div style={{
        padding: "24px 20px", borderRadius: 16, textAlign: "center",
        background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%)",
        border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>🎤</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>
          Mock Oral Exam
        </div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", lineHeight: 1.7, maxWidth: 400, margin: "0 auto 20px" }}>
          Simulates the real IB Ab Initio oral exam with a random visual stimulus. Speak out loud — this is your rehearsal.
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, maxWidth: 340, margin: "0 auto 24px", textAlign: "left" }}>
          {[
            { phase: "Preparation", time: "15 min", desc: "Study the image, make notes", icon: "📝" },
            { phase: "Presentation", time: "2 min", desc: "Describe & analyze the image", icon: "🎤" },
            { phase: "Follow-up", time: "3 min", desc: "Answer questions on the image", icon: "❓" },
            { phase: "General conversation", time: "5 min", desc: "Broader discussion topics", icon: "💬" },
          ].map((p, i) => (
            <div key={i} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8,
              background: "rgba(0,0,0,0.2)", border: "1px solid rgba(51,65,85,0.2)",
            }}>
              <span style={{ fontSize: 18 }}>{p.icon}</span>
              <div style={{ flex: 1 }}>
                <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700, color: "#e2e8f0" }}>{p.phase}</span>
                <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b", marginLeft: 6 }}>({p.time})</span>
              </div>
            </div>
          ))}
        </div>
        <button onClick={startExam} style={{
          padding: "14px 40px", borderRadius: 12, border: "none", cursor: "pointer",
          background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
          fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 700,
          boxShadow: "0 4px 20px rgba(99,102,241,0.3)",
        }}>Start Mock Exam</button>
      </div>
    </div>
    )}

    {/* Done screen */}
    {phase === "done" && (
    <div style={{
      padding: "32px 20px", borderRadius: 16, textAlign: "center",
      background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%)",
      border: "1px solid rgba(52,211,153,0.3)",
    }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🏆</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#34d399", marginBottom: 8 }}>
        Mock Exam Complete!
      </div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", lineHeight: 1.7, marginBottom: 8 }}>
        You completed all 4 phases with: <strong style={{ color: "#e2e8f0" }}>{image?.title}</strong>
      </div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginBottom: 24 }}>
        {questionsUsed} questions answered in conversation
      </div>
      <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
        <button onClick={startExam} style={{
          padding: "12px 24px", borderRadius: 10, border: "none", cursor: "pointer",
          background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
        }}>New Exam</button>
        <button onClick={() => { setPhase("idle"); setImage(null); }} style={{
          padding: "12px 24px", borderRadius: 10, cursor: "pointer",
          border: "1px solid rgba(51,65,85,0.4)", background: "transparent", color: "#64748b",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
        }}>Back</button>
      </div>
    </div>
    )}

    {/* Active exam */}
    {phase !== "idle" && phase !== "done" && (
    <div style={isFullscreen ? { display: "flex", flexDirection: "column", flex: 1, minHeight: 0 } : {}}>
      {/* Phase header */}
      <div style={{
        padding: isFullscreen ? "10px 16px" : "14px 16px", borderRadius: 12, marginBottom: isFullscreen ? 8 : 14,
        background: `${phaseInfo.color}10`, border: `1px solid ${phaseInfo.color}30`,
        display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0,
      }}>
        <div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: phaseInfo.color }}>
            {phaseInfo.icon} {phaseInfo.label}
          </div>
          {!isFullscreen && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b", marginTop: 2 }}>
            {phaseInfo.desc}
          </div>}
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 28, fontWeight: 700, letterSpacing: "1px",
            color: urgentColor, transition: "color 0.3s",
          }}>
            {mins}:{secs.toString().padStart(2, "0")}
          </div>
        </div>
      </div>

      {/* Progress bar + phase dots combined row */}
      <div style={{ flexShrink: 0, marginBottom: isFullscreen ? 8 : 16 }}>
        <div style={{ background: "#1e293b", borderRadius: 4, height: 6, marginBottom: isFullscreen ? 6 : 16, overflow: "hidden" }}>
          <div style={{
            width: `${pct}%`, height: "100%", borderRadius: 4,
            background: urgentColor, transition: "width 1s linear, background 0.3s",
          }} />
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {["prep", "presentation", "followup", "conversation"].map(p => {
            const pi = PHASES[p];
            const isCurrent = phase === p;
            const order = ["prep", "presentation", "followup", "conversation"];
            const isPast = order.indexOf(p) < order.indexOf(phase);
            return (
              <div key={p} style={{
                flex: 1, height: 4, borderRadius: 2,
                background: isPast ? "#34d399" : isCurrent ? pi.color : "#1e293b",
                transition: "background 0.3s",
              }} />
            );
          })}
        </div>
      </div>

      {/* Image — flexes to fill in fullscreen */}
      {image && (
        <div style={{
          borderRadius: 12, overflow: "hidden", marginBottom: isFullscreen ? 8 : 16,
          border: "1px solid rgba(51,65,85,0.4)",
          background: "#0c0f1a",
          ...(isFullscreen ? { flex: 1, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center" } : {}),
        }}>
          <img src={image.url} alt={image.title} style={{
            width: "100%", objectFit: "contain", display: "block",
            ...(isFullscreen ? { maxHeight: "100%", maxWidth: "100%" } : { maxHeight: phase === "prep" ? 400 : 200 }),
          }} onError={(e) => { e.target.style.display = "none"; }} />
        </div>
      )}

      {/* Image info */}
      {image && (
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginBottom: isFullscreen ? 6 : 16, textAlign: "center", flexShrink: 0 }}>
          {image.title}
        </div>
      )}

      {/* Prep phase — show tips */}
      {phase === "prep" && (
        <div style={{
          padding: isFullscreen ? "10px 14px" : "16px 18px", borderRadius: 12, flexShrink: 0,
          background: "#111827", border: "1px solid rgba(51,65,85,0.4)",
          ...(isFullscreen ? { overflow: "auto", maxHeight: 160 } : {}),
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700, color: "#a5b4fc", marginBottom: 10 }}>
            📋 Preparation checklist
          </div>
          {[
            "Identify WHO is in the image and WHAT they are doing",
            "Note WHERE the scene takes place",
            "Think about WHEN this could be happening",
            "Prepare vocabulary: clothes, objects, actions, emotions",
            "Plan your storytelling: past → present → future",
            "Prepare connectors: d'abord, ensuite, de plus, cependant...",
            "Think of a personal connection to share",
            "Prepare for possible follow-up questions",
          ].map((tip, i) => (
            <div key={i} style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#cbd5e1", lineHeight: 1.6,
              padding: "4px 0", paddingLeft: 16, position: "relative",
            }}>
              <span style={{ position: "absolute", left: 0, color: "#6366f1" }}>•</span>
              {tip}
            </div>
          ))}
        </div>
      )}

      {/* Presentation phase — just the timer and image */}
      {phase === "presentation" && (
        <div style={{
          padding: isFullscreen ? "12px 16px" : "20px", borderRadius: 12, textAlign: "center", flexShrink: 0,
          background: "#111827", border: "1px solid rgba(51,65,85,0.4)",
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#94a3b8", lineHeight: 1.7 }}>
            Speak now! Describe the image, tell a story around it, and share your personal reaction.
            Use <span style={{ color: "#a5b4fc", fontWeight: 600 }}>connectors</span> and <span style={{ color: "#f59e0b", fontWeight: 600 }}>different tenses</span>.
          </div>
        </div>
      )}

      {/* Follow-up & Conversation — question display */}
      {(phase === "followup" || phase === "conversation") && currentQ && (
        <div style={{
          padding: isFullscreen ? "16px" : "24px 20px", borderRadius: 12, textAlign: "center", marginBottom: isFullscreen ? 8 : 14, flexShrink: 0,
          background: "#111827", border: `1px solid ${phaseInfo.color}30`,
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 12 }}>
            Question {questionsUsed + 1}
          </div>
          <div style={{
            fontSize: 18, fontWeight: 700, color: "#e2e8f0", lineHeight: 1.5, marginBottom: 12,
            fontFamily: "'Libre Baskerville', serif",
          }}>
            {currentQ.fr}
          </div>
          {showEn && currentQ.en && (
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", fontStyle: "italic", marginBottom: 8 }}>
              {currentQ.en}
            </div>
          )}
          {!showEn && currentQ.en && (
            <button onClick={() => setShowEn(true)} style={{
              padding: "4px 12px", borderRadius: 6, border: "1px solid rgba(51,65,85,0.3)",
              background: "transparent", color: "#475569", cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 600, marginBottom: 8,
            }}>Show English</button>
          )}
          <div style={{ marginTop: 16 }}>
            <button onClick={() => { nextQuestion(); SFX.tap(); }} style={{
              padding: "12px 32px", borderRadius: 10, border: "none", cursor: "pointer",
              background: `linear-gradient(135deg, ${phaseInfo.color}, ${phaseInfo.color}cc)`, color: "#fff",
              fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
            }}>Answered — Next Question →</button>
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{ display: "flex", gap: 8, marginTop: isFullscreen ? 8 : 12, flexShrink: 0 }}>
        <FullscreenBtn />
        <button onClick={skipToNext} style={{
          flex: 2, padding: "12px", borderRadius: 10, border: "none", cursor: "pointer",
          background: "rgba(99,102,241,0.1)", color: "#a5b4fc",
          fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700,
        }}>Skip to {phase === "conversation" ? "End" : "Next Phase"} →</button>
        <button onClick={abort} style={{
          flex: 1, padding: "12px", borderRadius: 10, cursor: "pointer",
          border: "1px solid rgba(239,68,68,0.3)", background: "transparent", color: "#f87171",
          fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700,
        }}>End</button>
      </div>
    </div>
    )}

    </div>
    </div>
  );
}

function ExamTips() {
  const [section, setSection] = useState("mock");

  return (
    <div>
      {/* Section selector */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {[
          { id: "mock", label: "🎤 Mock" },
          { id: "checklist", label: "✅ Checklist" },
          { id: "connectors", label: "🔗 Connectors" },
          { id: "criteria", label: "📊 Criteria" },
          { id: "questions", label: "❓ Questions" },
        ].map(s => (
          <button key={s.id} onClick={() => setSection(s.id)} style={{
            flex: 1, padding: "10px 6px", borderRadius: 10, cursor: "pointer", textAlign: "center",
            border: section === s.id ? "1.5px solid #6366f1" : "1.5px solid rgba(51,65,85,0.4)",
            background: section === s.id ? "rgba(99,102,241,0.1)" : "#111827",
            color: section === s.id ? "#a5b4fc" : "#64748b",
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700,
          }}>{s.label}</button>
        ))}
      </div>

      {section === "mock" && <MockExam />}
      {section === "checklist" && <TipsChecklist />}
      {section === "connectors" && <ConnectorsPractice />}
      {section === "criteria" && <TipsCriteria />}
      {section === "questions" && <TipsQuestions />}
    </div>
  );
}

function TipsChecklist() {
  const [checked, setChecked] = useState({});
  const toggle = (si, ti) => { const key = `${si}-${ti}`; setChecked(prev => ({ ...prev, [key]: !prev[key] })); };
  const total = TIPS.reduce((sum, s) => sum + s.tips.length, 0);
  const done = Object.values(checked).filter(Boolean).length;

  return (
    <div>
      <div style={{
        padding: "16px 20px", borderRadius: 12, marginBottom: 20, textAlign: "center",
        background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%)", border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Revision checklist</div>
        <div style={{ fontSize: 32, fontWeight: 700, color: done === total ? "#34d399" : "#a5b4fc" }}>{done}/{total}</div>
        <div style={{ background: "#1e293b", borderRadius: 6, height: 6, marginTop: 12, overflow: "hidden" }}>
          <div style={{ width: `${(done / total) * 100}%`, height: "100%", borderRadius: 6, transition: "width 0.4s ease",
            background: done === total ? "linear-gradient(90deg, #34d399, #10b981)" : "linear-gradient(90deg, #6366f1, #818cf8)" }} />
        </div>
      </div>
      {TIPS.map((section, si) => (
        <div key={si} style={{ marginBottom: 20 }}>
          <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, color: "#818cf8", textTransform: "uppercase", letterSpacing: "1.5px", margin: "0 0 10px 0" }}>{section.title}</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {section.tips.map((tip, ti) => {
              const key = `${si}-${ti}`; const isDone = checked[key];
              return (
                <div key={ti} onClick={() => toggle(si, ti)} style={{
                  display: "flex", gap: 12, padding: "12px 14px", borderRadius: 10, cursor: "pointer", alignItems: "flex-start", transition: "all 0.2s",
                  background: isDone ? "rgba(52,211,153,0.05)" : "#111827",
                  border: `1px solid ${isDone ? "rgba(52,211,153,0.2)" : "rgba(51,65,85,0.4)"}`,
                }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 6, flexShrink: 0, marginTop: 1, transition: "all 0.2s",
                    border: isDone ? "2px solid #34d399" : "2px solid #475569",
                    background: isDone ? "#34d39920" : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12,
                  }}>{isDone ? "✓" : ""}</div>
                  <div style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 13, lineHeight: 1.5, transition: "all 0.2s",
                    color: isDone ? "#94a3b8" : "#cbd5e1",
                    textDecoration: isDone ? "line-through" : "none", opacity: isDone ? 0.7 : 1,
                  }}>{tip}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function TipsCriteria() {
  const [expandedCrit, setExpandedCrit] = useState(null);
  const totalMarks = ASSESSMENT_CRITERIA.reduce((s, c) => s + c.max, 0);

  return (
    <div>
      <div style={{
        padding: "16px 20px", borderRadius: 12, marginBottom: 20, textAlign: "center",
        background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%)", border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Total marks available</div>
        <div style={{ fontSize: 32, fontWeight: 700, color: "#a5b4fc" }}>{totalMarks}</div>
        <div style={{ display: "flex", gap: 4, marginTop: 12, justifyContent: "center" }}>
          {ASSESSMENT_CRITERIA.map((c, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: c.color }} />
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#94a3b8" }}>{c.name.split("—")[1]?.trim()} ({c.max})</span>
            </div>
          ))}
        </div>
      </div>

      {ASSESSMENT_CRITERIA.map((crit, ci) => {
        const isOpen = expandedCrit === ci;
        return (
          <div key={ci} onClick={() => setExpandedCrit(isOpen ? null : ci)} style={{
            padding: "14px 16px", borderRadius: 10, marginBottom: 8, cursor: "pointer", transition: "all 0.2s",
            background: isOpen ? `${crit.color}06` : "#111827",
            border: `1px solid ${isOpen ? `${crit.color}30` : "rgba(51,65,85,0.4)"}`,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: "#e2e8f0" }}>{crit.name}</div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 2 }}>Out of {crit.max} marks</div>
              </div>
              <span style={{ fontSize: 12, color: "#64748b" }}>{isOpen ? "▲" : "▼"}</span>
            </div>
            {isOpen && (
              <div style={{ marginTop: 14 }}>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: crit.color, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Mark bands</div>
                {crit.bands.map((band, bi) => (
                  <div key={bi} style={{
                    display: "flex", gap: 10, padding: "8px 12px", borderRadius: 6, marginBottom: 4,
                    background: bi === 0 ? `${crit.color}08` : "transparent",
                    border: bi === 0 ? `1px solid ${crit.color}20` : "1px solid transparent",
                  }}>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700, color: crit.color, minWidth: 40 }}>{band.range}</span>
                    <div>
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700, color: "#cbd5e1" }}>{band.label}: </span>
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8" }}>{band.desc}</span>
                    </div>
                  </div>
                ))}
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: "#34d399", letterSpacing: "1px", textTransform: "uppercase", marginTop: 14, marginBottom: 8 }}>How to score higher</div>
                {crit.tips.map((tip, ti) => (
                  <div key={ti} style={{
                    padding: "8px 12px", borderRadius: 6, marginBottom: 4,
                    background: "rgba(52,211,153,0.04)", borderLeft: "3px solid rgba(52,211,153,0.3)",
                    fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#cbd5e1", lineHeight: 1.5,
                  }}>{tip}</div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function TipsQuestions() {
  const [activeTheme, setActiveTheme] = useState("identities");
  const [showAnswer, setShowAnswer] = useState(null);
  const [practiceMode, setPracticeMode] = useState(false);

  const themeData = TEACHER_QUESTIONS[activeTheme];

  return (
    <div>
      <div style={{
        padding: "14px 16px", borderRadius: 10, marginBottom: 16,
        background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
          Common questions your teacher might ask during Parts 2 & 3 of the oral. Practice answering these out loud — {practiceMode ? <span style={{ color: "#f59e0b", fontWeight: 600 }}>English hidden! Try to understand the French.</span> : "tap any question to see it in English."}
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", flex: 1 }}>
          {Object.entries(TEACHER_QUESTIONS).map(([key, t]) => (
            <button key={key} onClick={() => { setActiveTheme(key); setShowAnswer(null); }} style={{
              padding: "6px 12px", borderRadius: 8, cursor: "pointer", transition: "all 0.2s",
              border: activeTheme === key ? `1.5px solid ${t.color}` : "1.5px solid rgba(51,65,85,0.4)",
              background: activeTheme === key ? `${t.color}15` : "#111827",
              color: activeTheme === key ? t.color : "#94a3b8",
              fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
            }}>{t.theme}</button>
          ))}
        </div>
        <button onClick={() => { setPracticeMode(!practiceMode); setShowAnswer(null); }} style={{
          padding: "6px 12px", borderRadius: 8, cursor: "pointer", marginLeft: 8, flexShrink: 0,
          border: practiceMode ? "1.5px solid #f59e0b" : "1.5px solid rgba(51,65,85,0.4)",
          background: practiceMode ? "rgba(245,158,11,0.1)" : "#111827",
          color: practiceMode ? "#f59e0b" : "#64748b",
          fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
        }}>{practiceMode ? "🔥 Hard" : "👁️ Easy"}</button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {themeData.questions.map((q, i) => {
          const isOpen = showAnswer === i;
          return (
            <div key={i} onClick={() => setShowAnswer(isOpen ? null : i)} style={{
              padding: "14px 16px", borderRadius: 10, cursor: "pointer", transition: "all 0.2s",
              background: isOpen ? `${themeData.color}06` : "#111827",
              border: `1px solid ${isOpen ? `${themeData.color}30` : "rgba(51,65,85,0.4)"}`,
            }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                <span style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 800, color: themeData.color,
                  background: `${themeData.color}20`, padding: "2px 8px", borderRadius: 4, marginTop: 2, flexShrink: 0,
                }}>Q{i + 1}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", lineHeight: 1.5 }}>{q.fr}</div>
                  {!practiceMode && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 4 }}>{q.en}</div>}
                  {practiceMode && isOpen && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", marginTop: 8, padding: "8px 12px", borderRadius: 6, background: `${themeData.color}08`, borderLeft: `3px solid ${themeData.color}40` }}>{q.en}</div>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
