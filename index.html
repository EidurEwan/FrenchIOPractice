function CultureType({ culture, activeTheme }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = [...culture.facts];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeTheme]);

  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const normalize = (s) => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");
  const check = (input, target) => {
    if (!input.trim()) return "wrong";
    const wi = normalize(input).split(" ").filter(w => w.length > 2);
    const wt = normalize(target).split(" ").filter(w => w.length > 2);
    let m = 0; for (const w of wi) if (wt.some(tw => tw.includes(w) || w.includes(tw))) m++;
    if (m >= wt.length * 0.5) return "close";
    if (m >= 2) return "close";
    return "wrong";
  };

  const score = submitted ? pool.filter((p, i) => check(answers[i] || "", p.useful) !== "wrong").length : 0;

  useEffect(() => { if (submitted) stats.record("culture", "type", score, pool.length, activeTheme); }, [submitted]);

  return (
    <div>
      <div style={{ padding: "14px 16px", borderRadius: 10, marginBottom: 16, background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.2)" }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
          For each cultural topic, write the <span style={{ color: culture.color, fontWeight: 600 }}>French sentence</span> you'd use in your oral. Don't worry about being exact — key words count!
        </div>
      </div>
      {pool.map((fact, i) => {
        const result = submitted ? check(answers[i] || "", fact.useful) : null;
        return (
          <div key={i} style={{
            padding: "14px 16px", borderRadius: 10, marginBottom: 8,
            background: submitted ? (result === "close" ? "rgba(52,211,153,0.05)" : "rgba(239,68,68,0.05)") : "#111827",
            border: `1px solid ${submitted ? (result === "close" ? "rgba(52,211,153,0.3)" : "rgba(239,68,68,0.3)") : "rgba(51,65,85,0.4)"}`,
          }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>{fact.title}</div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b", marginBottom: 10 }}>{fact.detail.slice(0, 80)}…</div>
            <textarea value={answers[i] || ""} onChange={e => setAnswers(p => ({ ...p, [i]: e.target.value }))} disabled={submitted}
              placeholder="Write a French sentence about this topic…" rows={2}
              style={{
                width: "100%", padding: "10px 12px", borderRadius: 8, boxSizing: "border-box", resize: "vertical",
                border: `1px solid ${submitted ? (result === "close" ? "#34d399" : "#ef4444") : "rgba(99,102,241,0.2)"}`,
                background: "rgba(0,0,0,0.2)", color: "#e2e8f0", fontSize: 13, fontFamily: "'Libre Baskerville', serif", outline: "none", lineHeight: 1.6,
              }} />
            {submitted && (
              <div style={{ marginTop: 8, padding: "10px 14px", borderRadius: 8, background: `${culture.color}06`, borderLeft: `3px solid ${culture.color}` }}>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: culture.color, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 4 }}>
                  {result === "close" ? "✓ Good!" : "Model answer:"}
                </div>
                <div style={{ fontSize: 13, fontStyle: "italic", color: "#cbd5e1", lineHeight: 1.5 }}>{fact.useful}</div>
              </div>
            )}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => setSubmitted(true)} style={{
          width: "100%", padding: "14px", borderRadius: 10, border: "none", marginTop: 8, cursor: "pointer",
          background: `linear-gradient(135deg, ${culture.color}, ${culture.color}bb)`, color: "#fff",

          </div>
          <button onClick={() => { setAnswers({}); setSubmitted(false); }} style={{

            background: "transparent", color: culture.color, fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,

function CardRecall({ themeKey, theme }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = [...theme.cards];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [themeKey]);

  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showFr, setShowFr] = useState(true);
  const [score, setScore] = useState({ yes: 0, no: 0 });

  const card = pool[index];
  const front = showFr ? card.fr : card.en;
  const back = showFr ? card.en : card.fr;
  const done = score.yes + score.no >= pool.length;

  useEffect(() => {
    if (done) { SFX.complete(); stats.record("vocab", "recall", score.yes, pool.length, themeKey); }
  }, [done]);

  const mark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
    setFlipped(false);
    if (index + 1 < pool.length) setIndex(index + 1);
  };
  const restart = () => { setIndex(0); setFlipped(false); setScore({ yes: 0, no: 0 }); };

  // Keyboard shortcuts
  const markRef2 = useRef(mark);
  markRef2.current = mark;
  const flippedRef2 = useRef(flipped);
  flippedRef2.current = flipped;
  useEffect(() => {
    if (done) return;
    const handler = (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); setFlipped(f => !f); SFX.flip(); }
      if (flippedRef2.current && (e.key === "1" || e.key === "ArrowLeft")) markRef2.current(false);
      if (flippedRef2.current && (e.key === "2" || e.key === "ArrowRight")) markRef2.current(true);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [done]);

  if (done) return (
    <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
      <div style={{ fontSize: 40, marginBottom: 12 }}>{score.yes > score.no ? "🎉" : "💪"}</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#e2e8f0" }}>
        {score.yes}/{pool.length} correct
      </div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>
        {score.yes === pool.length ? "Perfect score!" : `${score.no} to review — keep going!`}
      </div>
      <button onClick={restart} style={{
        padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
        background: `linear-gradient(135deg, ${theme.color}, ${theme.color}bb)`, color: "#fff",
        fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
      }}>Try Again</button>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <button onClick={() => { setShowFr(!showFr); setFlipped(false); }} style={{
          padding: "6px 14px", borderRadius: 8, border: "1px solid rgba(99,102,241,0.3)",
          background: "rgba(99,102,241,0.08)", color: "#a5b4fc",
          fontSize: 12, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, cursor: "pointer",
        }}>{showFr ? "See FR → recall EN" : "See EN → recall FR"}</button>
        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{index + 1}/{pool.length}</span>
      </div>

      {/* Progress */}
      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        <div style={{ flex: score.yes, height: 4, borderRadius: 2, background: "#34d399", transition: "flex 0.3s" }} />
        <div style={{ flex: score.no, height: 4, borderRadius: 2, background: "#f87171", transition: "flex 0.3s" }} />
        <div style={{ flex: Math.max(0, pool.length - score.yes - score.no), height: 4, borderRadius: 2, background: "#1e293b", transition: "flex 0.3s" }} />
      </div>

      <div onClick={() => { setFlipped(!flipped); SFX.flip(); }} style={{
        minHeight: 200, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
        padding: "40px 24px", borderRadius: 16, cursor: "pointer", textAlign: "center", transition: "all 0.3s",
        background: flipped ? `linear-gradient(145deg, ${theme.color}15, ${theme.color}08)` : "linear-gradient(145deg, #1e293b, #111827)",
        border: `1.5px solid ${flipped ? `${theme.color}40` : "rgba(51,65,85,0.5)"}`,
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: "#64748b", marginBottom: 14 }}>
          {flipped ? (showFr ? "English" : "Français") : (showFr ? "Français" : "English")}
        </div>
        <div style={{ fontSize: flipped ? 20 : 24, fontWeight: 700, color: flipped ? "#cbd5e1" : "#f1f5f9", lineHeight: 1.4 }}>
          {flipped ? back : front}
        </div>
        {!flipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#475569", marginTop: 20 }}>Tap or Space to flip · 1/2 to answer</div>}
      </div>

      {flipped && (
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <button onClick={() => mark(false)} style={{
            flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(239,68,68,0.4)",
            background: "#111827", color: "#f87171", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>✗ Didn't know (1)</button>
          <button onClick={() => mark(true)} style={{
            flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(52,211,153,0.4)",
            background: "#111827", color: "#34d399", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>✓ Knew it (2)</button>
        </div>
      )}
    </div>
  );
}

function CardType({ themeKey, theme }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = [...theme.cards];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [themeKey]);

  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [showFr, setShowFr] = useState(true);

  const normalize = (s) => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");
  const check = (input, target) => {
    const ni = normalize(input), nt = normalize(target);
    if (ni === nt) return "exact";
    const wi = ni.split(" "), wt = nt.split(" ");
    let m = 0; for (const w of wi) if (wt.includes(w)) m++;
    if (m >= wt.length * 0.6) return "close";
    return "wrong";
  };

  const prompt = showFr ? "en" : "fr";
  const answer = showFr ? "fr" : "en";
  const score = submitted ? pool.filter((p, i) => { const r = check(answers[i] || "", p[answer]); return r === "exact" || r === "close"; }).length : 0;

  useEffect(() => { if (submitted) stats.record("vocab", "type", score, pool.length, themeKey); }, [submitted]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>

            border: `1px solid ${submitted ? (result === "exact" ? "rgba(52,211,153,0.3)" : result === "close" ? "rgba(250,204,21,0.3)" : "rgba(239,68,68,0.3)") : "rgba(51,65,85,0.4)"}`,
          }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, color: "#e2e8f0", marginBottom: 8 }}>{p[prompt]}</div>
            <input value={answers[i] || ""} onChange={e => setAnswers(prev => ({ ...prev, [i]: e.target.value }))} disabled={submitted}
              placeholder={`Type the ${showFr ? "French" : "English"}…`}
              style={{
                width: "100%", padding: "10px 12px", borderRadius: 8, boxSizing: "border-box",
                border: `1px solid ${submitted ? (result === "exact" ? "#34d399" : result === "close" ? "#facc15" : "#ef4444") : "rgba(99,102,241,0.2)"}`,
                background: "rgba(0,0,0,0.2)", color: "#e2e8f0", fontSize: 14, fontFamily: "'Libre Baskerville', serif", outline: "none",
              }} />
            {submitted && result !== "exact" && (
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, marginTop: 6 }}>
                {result === "close" && <span style={{ color: "#facc15" }}>Almost! </span>}
                <span style={{ color: "#64748b" }}>Answer: </span><span style={{ color: "#34d399", fontWeight: 600 }}>{p[answer]}</span>
              </div>
            )}
            {submitted && result === "exact" && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#34d399", marginTop: 6, fontWeight: 600 }}>✓ Correct!</div>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => setSubmitted(true)} style={{
          width: "100%", padding: "14px", borderRadius: 10, border: "none", marginTop: 8, cursor: "pointer",
          background: `linear-gradient(135deg, ${theme.color}, ${theme.color}bb)`, color: "#fff",

          </div>
          <button onClick={() => { setAnswers({}); setSubmitted(false); }} style={{
            width: "100%", padding: "14px", borderRadius: 10, border: `1.5px solid ${theme.color}40`, marginTop: 8, cursor: "pointer",
            background: "transparent", color: theme.color, fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,

function formatTimeLeft(ms) {
  if (ms <= 0) return "now";
  const secs = Math.floor(ms / 1000);
  if (secs < 60) return `${secs}s`;
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  return `${hrs}h ${mins % 60}m`;
}

function formatInterval(mins) {
  if (mins < 1) return "<1min";
  if (mins < 60) return `${Math.round(mins)}min`;
  return `${Math.round(mins / 60)}h ${Math.round(mins % 60)}min`;
}

function SrsSchedule({ catMeta }) {
  const stats = useStats();
  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 5000);
    return () => clearInterval(t);
  }, []);

  const allSrs = stats.getAllSrsCards();
  const dueCards = stats.getDueCards(now);
  const upcomingCards = stats.getUpcomingCards(now);

  if (allSrs.length === 0) return null;

  const easeColor = (ease) => ease >= 2.5 ? "#34d399" : ease >= 1.8 ? "#f59e0b" : "#f87171";
  const streakEmoji = (s) => s >= 5 ? "🔥" : s >= 3 ? "⚡" : s >= 1 ? "✓" : "";

  return (
    <div style={{
      padding: "16px 18px", borderRadius: 12, marginBottom: 16,
      background: "#111827", border: `1px solid ${dueCards.length > 0 ? "rgba(239,68,68,0.3)" : "rgba(51,65,85,0.4)"}`,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: "#a5b4fc", letterSpacing: "1.5px", textTransform: "uppercase" }}>
          🔁 Spaced Repetition
        </div>
        {dueCards.length > 0 && (
          <span style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700,
            padding: "3px 10px", borderRadius: 10, background: "rgba(239,68,68,0.15)", color: "#f87171",
          }}>
            {dueCards.length} DUE NOW
          </span>
        )}
      </div>

      <div style={{
        padding: "10px 14px", borderRadius: 8, marginBottom: 14,
        background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.12)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
          Uses the <span style={{ color: "#a5b4fc", fontWeight: 600 }}>SM-2 algorithm</span> (Anki). Score well → interval grows. Struggle → review sooner. Intervals: 1→2→8→longer minutes.
        </div>
      </div>

      {/* Due now */}
      {dueCards.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#f87171", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 8 }}>
            ⚡ Review now
          </div>
          {dueCards.map((card, i) => {
            const meta = catMeta[card.category] || { label: card.category, icon: "📦", color: "#94a3b8" };
            const overdue = Math.round((now - card.nextReview) / 60000);
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8, marginBottom: 4,
                background: "rgba(239,68,68,0.05)", border: "1px solid rgba(239,68,68,0.2)",
              }}>
                <span style={{ fontSize: 16 }}>{meta.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>
                    {meta.label}{card.detail !== "all" ? ` · ${card.detail}` : ""}
                  </div>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#f87171" }}>
                    Overdue by {overdue < 1 ? "<1" : overdue}min · Last: {Math.round((card.accuracy || 0) * 100)}%
                  </div>
                </div>
                <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: "#f87171" }}>GO</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Upcoming */}
      {upcomingCards.length > 0 && (
        <div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 8 }}>
            ⏰ Coming up
          </div>
          {upcomingCards.filter(c => c.detail !== "all").map((card, i) => {
            const meta = catMeta[card.category] || { label: card.category, icon: "📦", color: "#94a3b8" };
            const timeLeft = card.nextReview - now;
            const pct = Math.round((card.accuracy || 0) * 100);
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8, marginBottom: 4,
                background: "rgba(0,0,0,0.15)", border: "1px solid rgba(51,65,85,0.2)",
              }}>
                <span style={{ fontSize: 16 }}>{meta.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#cbd5e1" }}>
                      {meta.label}{card.detail !== "all" ? ` · ${card.detail}` : ""}
                    </span>
                    <span style={{ fontSize: 11 }}>{streakEmoji(card.streak)}</span>
                  </div>
                  <div style={{ display: "flex", gap: 10, marginTop: 3 }}>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#475569" }}>
                      Last: <span style={{ color: pct >= 80 ? "#34d399" : pct >= 50 ? "#f59e0b" : "#f87171" }}>{pct}%</span>
                    </span>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#475569" }}>
                      Ease: <span style={{ color: easeColor(card.ease || 2.5) }}>{(card.ease || 2.5).toFixed(1)}</span>
                    </span>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#475569" }}>
                      Interval: {formatInterval(card.interval)}
                    </span>
                  </div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
                    color: timeLeft < 60000 ? "#f59e0b" : "#64748b",
                  }}>
                    {formatTimeLeft(timeLeft)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ProficiencyTab() {
  const stats = useStats();
  const prof = stats.proficiency();
  const attempts = stats.attempts;

  const catMeta = {
    vocab: { label: "Vocabulary", icon: "🃏", color: "#6366f1" },
    phrases: { label: "Phrases", icon: "💬", color: "#818cf8" },
    verbs: { label: "Verbs", icon: "⏳", color: "#f59e0b" },
    culture: { label: "Culture", icon: "🌍", color: "#2dd4bf" },
  };

  const modeMeta = {
    recall: { label: "Recall", icon: "🧠" },
    mastery: { label: "Mastery", icon: "🏆" },
    type: { label: "Type It", icon: "✏️" },
    match: { label: "Match", icon: "🔗" },
    build: { label: "Build", icon: "🧩" },
  };

  const dueCards = stats.getDueCards();

  // Group due cards by category for navigation
  const dueByCategory = useMemo(() => {
    const groups = {};
    dueCards.forEach(card => {
      if (!groups[card.category]) groups[card.category] = [];
      groups[card.category].push(card);
    });
    return groups;
  }, [dueCards]);

  // Timeline data: group by minute
  const timeline = useMemo(() => {
    if (attempts.length === 0) return [];
    const buckets = {};
    attempts.forEach((a, i) => {
      const key = i;
      buckets[key] = a;
    });
    return attempts;
  }, [attempts]);

  // Strengths & weaknesses
  const strengths = useMemo(() => {
    const items = [];
    Object.entries(prof.breakdown || {}).forEach(([cat, data]) => {
      items.push({ cat, ...data });
    });
    items.sort((a, b) => b.accuracy - a.accuracy);
    return items;
  }, [prof]);

  // Mode performance
  const modePerf = useMemo(() => {
    const modes = {};
    attempts.forEach(a => {
      if (!modes[a.mode]) modes[a.mode] = { score: 0, total: 0, count: 0 };
      modes[a.mode].score += a.score;
      modes[a.mode].total += a.total;
      modes[a.mode].count++;
    });
    return modes;
  }, [attempts]);

  if (attempts.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "60px 24px" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>No data yet</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#64748b", lineHeight: 1.6, maxWidth: 320, margin: "0 auto" }}>
          Complete practice rounds in Recall, Mastery, Type It, or Match mode across any tab to start tracking your proficiency.
        </div>
        <div style={{
          marginTop: 20, padding: "10px 16px", borderRadius: 8, display: "inline-block",
          background: stats.hasLocalStorage ? "rgba(52,211,153,0.05)" : "rgba(245,158,11,0.05)",
          border: `1px solid ${stats.hasLocalStorage ? "rgba(52,211,153,0.15)" : "rgba(245,158,11,0.15)"}`,
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: stats.hasLocalStorage ? "#34d399" : "#f59e0b" }}>
            {stats.hasLocalStorage ? "💾 Progress will be saved between sessions" : "⚠️ Open the downloaded HTML in your browser to save progress"}
          </div>
        </div>
      </div>
    );
  }

  const ringSize = 160;
  const ringStroke = 12;
  const ringRadius = (ringSize - ringStroke) / 2;
  const ringCircumference = 2 * Math.PI * ringRadius;
  const ringOffset = ringCircumference * (1 - prof.score / 100);

  return (
    <div>
      {/* SRS Due Items */}
      {dueCards.length > 0 && (
        <div style={{
          padding: "14px 16px", borderRadius: 12, marginBottom: 16,
          background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.2)",
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, color: "#f87171", marginBottom: 10 }}>
            ⚡ {dueCards.length} review{dueCards.length !== 1 ? "s" : ""} due
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {Object.entries(dueByCategory).map(([cat, cards]) => {
              const meta = catMeta[cat] || { label: cat, icon: "📦", color: "#94a3b8" };
              const tabId = CAT_TO_TAB[cat];
              const details = cards.map(c => c.detail).filter(d => d && d !== "all");
              return (
                <div key={cat} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8,
                  background: "rgba(0,0,0,0.15)", border: "1px solid rgba(51,65,85,0.2)",
                }}>
                  <span style={{ fontSize: 18 }}>{meta.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>

        <div style={{ position: "relative", display: "inline-block", marginBottom: 16 }}>

      </div>

          💡 Recommendations
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {(() => {
            const recs = [];
            const missing = Object.entries(prof.breakdown || {}).filter(([_, b]) => b.attempts === 0).map(([c]) => c);
            if (missing.length > 0) {
              const names = missing.map(m => catMeta[m]?.label || m).join(" or ");
              recs.push({ text: `You haven't practiced ${names} yet — ${missing.length === 1 ? "it counts" : "they count"} as 0% in your proficiency!`, color: "#ec4899" });
            }
            if (prof.score > 0 && prof.accuracy < 0.6) {
              recs.push({ text: "Your average accuracy across all categories is below 60%. Focus on your weakest areas.", color: "#f59e0b" });
            }
            const practiced = strengths.filter(s => s.attempts > 0);
            const weakest = practiced[practiced.length - 1];
            if (weakest && weakest.accuracy < 0.5 && practiced.length > 1) {
              recs.push({ text: `${catMeta[weakest.cat]?.label || weakest.cat} is your weakest area at ${Math.round(weakest.accuracy * 100)}%. Spend extra time there.`, color: "#f87171" });
            }
            if (prof.trend !== undefined && prof.trend < 0.45) {
              recs.push({ text: "Your recent scores are declining. Take a short break and come back refreshed.", color: "#f59e0b" });
            }
            if (prof.trend !== undefined && prof.trend > 0.6) {
              recs.push({ text: "You're improving! Keep up the momentum.", color: "#34d399" });
            }
            if (attempts.length < 5) {
              recs.push({ text: "Keep going! Complete at least 5 rounds to get a reliable proficiency score.", color: "#818cf8" });
            }
            if (prof.score >= 80) {
              recs.push({ text: "Excellent work! You're in great shape for the oral. Focus on the Script tab to practice your full presentation.", color: "#34d399" });
            }
            if (!Object.keys(modePerf).includes("type")) {
              recs.push({ text: "Try 'Type It' mode — spelling practice is crucial for the oral where you need to think of words on the spot.", color: "#818cf8" });
            }
            if (recs.length === 0) {
              recs.push({ text: "You're doing great! Keep practicing across all categories and modes.", color: "#34d399" });
            }
            return recs.slice(0, 4).map((rec, i) => (
              <div key={i} style={{
                padding: "10px 14px", borderRadius: 8,
                background: `${rec.color}06`, borderLeft: `3px solid ${rec.color}40`,
                fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#cbd5e1", lineHeight: 1.5,
              }}>{rec.text}</div>
            ));
          })()}
        </div>
      </div>

      {/* Storage & Reset */}
      <div style={{
        padding: "16px 18px", borderRadius: 12, marginTop: 16,
        background: "#111827", border: "1px solid rgba(51,65,85,0.4)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 12 }}>
          💾 Data storage
        </div>
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, marginBottom: 10,
          background: stats.hasLocalStorage ? "rgba(52,211,153,0.05)" : "rgba(245,158,11,0.05)",
          border: `1px solid ${stats.hasLocalStorage ? "rgba(52,211,153,0.2)" : "rgba(245,158,11,0.2)"}`,
        }}>
          <span style={{ fontSize: 16 }}>{stats.hasLocalStorage ? "✅" : "⚠️"}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>
              {stats.hasLocalStorage ? "Data saved locally" : "No persistent storage"}
            </div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b", marginTop: 2 }}>
              {stats.hasLocalStorage
                ? `${attempts.length} rounds · ${Object.keys(stats.srs).length} SRS cards · Session ${stats.totalSessions + 1}`
                : "Open the HTML file in your browser to enable localStorage"
              }
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          {/* Export */}
          <button onClick={() => {
            const data = JSON.stringify({ attempts: stats.attempts, srs: stats.srs, totalSessions: stats.totalSessions, firstOpened: stats.firstOpened, exportedAt: new Date().toISOString() }, null, 2);
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = "french-revision-progress.json"; a.click();
            URL.revokeObjectURL(url);
          }} style={{
            flex: 1, padding: "10px", borderRadius: 8, cursor: "pointer",
            border: "1px solid rgba(99,102,241,0.3)", background: "transparent",
            color: "#a5b4fc", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600,
          }}>
            📥 Export JSON
          </button>
          {stats.hasLocalStorage && (
            <button onClick={() => {
              if (confirm("Reset all progress? This will delete all practice history, spaced repetition data, and scores. This cannot be undone.")) {
                stats.clearAll();
              }
            }} style={{
              flex: 1, padding: "10px", borderRadius: 8, cursor: "pointer",

              color: "#f87171", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600,
            }}>
              🗑️ Reset all
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── Practice Timer ──────────────────────────────────────────────────────────
function PracticeTimer() {
  const [duration, setDuration] = useState(120); // seconds
  const [timeLeft, setTimeLeft] = useState(120);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && timeLeft > 0) {
      intervalRef.current = setInterval(() => setTimeLeft(t => { if (t <= 11 && t > 1) SFX.tick(); return t - 1; }), 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, timeLeft]);

  useEffect(() => {
    if (timeLeft <= 0 && running) { SFX.alarm(); setRunning(false); }
  }, [timeLeft, running]);

  const presets = [
    { label: "1:00", secs: 60, desc: "Quick practice" },
    { label: "2:00", secs: 120, desc: "Presentation" },
    { label: "3:00", secs: 180, desc: "Extended" },
    { label: "4:00", secs: 240, desc: "Full conversation" },
  ];
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const pct = duration > 0 ? (timeLeft / duration) * 100 : 0;
  const urgentColor = timeLeft <= 10 ? "#ef4444" : timeLeft <= 30 ? "#f59e0b" : "#6366f1";

  return (
    <div style={{
      padding: "16px 18px", borderRadius: 12, marginBottom: 20,
      background: "linear-gradient(135deg, #0f172a, #111827)", border: `1px solid ${urgentColor}30`,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 700, color: "#a5b4fc", letterSpacing: "1.5px", textTransform: "uppercase" }}>
          ⏱️ Practice Timer
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {presets.map(p => (
            <button key={p.secs} onClick={() => { setDuration(p.secs); setTimeLeft(p.secs); setRunning(false); }} style={{
              padding: "4px 10px", borderRadius: 6, cursor: "pointer",
              border: duration === p.secs ? `1px solid ${urgentColor}` : "1px solid rgba(51,65,85,0.4)",
              background: duration === p.secs ? `${urgentColor}15` : "transparent",
              color: duration === p.secs ? urgentColor : "#64748b",
              fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700,
            }}>{p.label}</button>
          ))}
        </div>
      </div>

      {/* Timer display */}
      <div style={{ textAlign: "center", marginBottom: 12 }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: 48, fontWeight: 700, letterSpacing: "2px",
          color: urgentColor, transition: "color 0.3s",
        }}>
          {mins}:{secs.toString().padStart(2, "0")}
        </div>
        {timeLeft <= 0 && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: "#ef4444", marginTop: 4 }}>⏰ Time's up!</div>}
      </div>

      {/* Progress bar */}
      <div style={{ background: "#1e293b", borderRadius: 4, height: 6, marginBottom: 12, overflow: "hidden" }}>
        <div style={{
          width: `${pct}%`, height: "100%", borderRadius: 4,
          background: urgentColor, transition: "width 1s linear, background 0.3s",
        }} />
      </div>

      {/* Controls */}
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setRunning(!running)} style={{
          flex: 2, padding: "10px", borderRadius: 8, border: "none", cursor: "pointer",
          background: running ? "rgba(239,68,68,0.15)" : "rgba(52,211,153,0.15)",
          color: running ? "#f87171" : "#34d399",
          fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700,
        }}>{running ? "⏸ Pause" : timeLeft < duration ? "▶ Resume" : "▶ Start"}</button>
        <button onClick={() => { setTimeLeft(duration); setRunning(false); }} style={{
          flex: 1, padding: "10px", borderRadius: 8, border: "1px solid rgba(51,65,85,0.4)",
          background: "transparent", color: "#64748b", cursor: "pointer",
          fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700,
        }}>↺ Reset</button>
      </div>
    </div>
  );
}
