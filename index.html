// ─── Sound Effects (Web Audio API) ───────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    return ctx;
  };
  const play = (fn) => { const c = getCtx(); if (c) { if (c.state === "suspended") c.resume(); fn(c); } };

  return {
    flip: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(800, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200, c.currentTime + 0.06);
      g.gain.setValueAtTime(0.08, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime); o.stop(c.currentTime + 0.1);
    }),
    correct: () => play(c => {
      [523, 659, 784].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "sine"; o.frequency.value = freq;
        g.gain.setValueAtTime(0.1, c.currentTime + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.08 + 0.2);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + i * 0.08); o.stop(c.currentTime + i * 0.08 + 0.2);
      });
    }),
    wrong: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "square"; o.frequency.setValueAtTime(200, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(150, c.currentTime + 0.15);
      g.gain.setValueAtTime(0.06, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime); o.stop(c.currentTime + 0.15);
    }),
    complete: () => play(c => {
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "sine"; o.frequency.value = freq;
        g.gain.setValueAtTime(0.12, c.currentTime + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.1 + 0.35);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + i * 0.1); o.stop(c.currentTime + i * 0.1 + 0.35);
      });
    }),
    tick: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.value = 1000;
      g.gain.setValueAtTime(0.04, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime); o.stop(c.currentTime + 0.04);
    }),
    alarm: () => play(c => {
      [880, 0, 880, 0, 880].forEach((freq, i) => {
        if (!freq) return;
        const o = c.createOscillator(), g = c.createGain();
        o.type = "square"; o.frequency.value = freq;
        g.gain.setValueAtTime(0.08, c.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.1);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + i * 0.12); o.stop(c.currentTime + i * 0.12 + 0.1);
      });
    }),
    phase: () => play(c => {
      [440, 554, 659].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "triangle"; o.frequency.value = freq;
        g.gain.setValueAtTime(0.1, c.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.3);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + i * 0.12); o.stop(c.currentTime + i * 0.12 + 0.3);
      });
    }),
    match: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(600, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(900, c.currentTime + 0.08);
      g.gain.setValueAtTime(0.1, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime); o.stop(c.currentTime + 0.12);
    }),
    tap: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.value = 600;
      g.gain.setValueAtTime(0.03, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.03);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime); o.stop(c.currentTime + 0.03);
    }),
  };
})();

    window.addEventListener("resize", handler);

}

// ─── Session Tracking System ──────────────────────────────────────────────────
const StatsContext = createContext();

function useStats() { return useContext(StatsContext); }

const STORAGE_KEY = "french-oral-revision-stats";

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveToStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch { /* quota exceeded or unavailable */ }
}

function createStatsStore() {
  const saved = loadFromStorage();
  const hasLocalStorage = (() => { try { localStorage.setItem("__test", "1"); localStorage.removeItem("__test"); return true; } catch { return false; } })();

  return {
    attempts: saved?.attempts || [],
    srs: saved?.srs || {},
    hasLocalStorage,
    totalSessions: (saved?.totalSessions || 0) + (saved ? 1 : 0),
    firstOpened: saved?.firstOpened || Date.now(),

    _save() {
      if (!this.hasLocalStorage) return;
      saveToStorage({
        attempts: this.attempts,
        srs: this.srs,
        totalSessions: this.totalSessions,
        firstOpened: this.firstOpened,
      });
    },
    clearAll() {
      this.attempts = [];
      this.srs = {};
      this.totalSessions = 0;
      this.firstOpened = Date.now();
      if (this.hasLocalStorage) localStorage.removeItem(STORAGE_KEY);
    },
    getSrsKey(category, detail) { return `${category}::${detail || "all"}`; },
    // SM-2 algorithm with mode weighting — match mode counts less
    modeWeight(mode) { return mode === "match" ? 0.6 : 1.0; },
    updateSrs(category, detail, score, total, mode) {
      const key = this.getSrsKey(category, detail);
      const rawPct = total > 0 ? score / total : 0;
      // Apply mode weight — match mode accuracy is discounted
      const weight = this.modeWeight(mode);
      const pct = rawPct * weight + (1 - weight) * 0.5; // blend toward 50% for match
      const quality = Math.min(5, Math.round(pct * 5)); // SM-2 quality 0-5
      const now = Date.now();
      const prev = this.srs[key] || { ease: 2.5, interval: 0, repetitions: 0, streak: 0 };

      let ease = prev.ease || 2.5;
      let interval, repetitions, streak;

      if (quality >= 3) {
        // Success — grow interval
        streak = (prev.streak || 0) + 1;
        repetitions = (prev.repetitions || 0) + 1;
        if (repetitions === 1) interval = 5;           // 5 min
        else if (repetitions === 2) interval = 25;     // 25 min
        else interval = Math.round((prev.interval || 25) * ease);
        // SM-2 ease update
        ease = Math.max(1.3, ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
      } else {
        // Fail — reset to short interval
        streak = 0;
        repetitions = 0;
        interval = quality <= 1 ? 1 : 3; // 1 or 3 min
        ease = Math.max(1.3, ease - 0.2);
      }
      // Cap at 7 days (10080 min) — useful with localStorage
      interval = Math.min(10080, interval);

      this.srs[key] = {
        key, category, detail: detail || "all",
        accuracy: rawPct,
        ease,
        interval,
        repetitions,
        streak,
        lastReview: now,
        nextReview: now + interval * 60 * 1000,
        attempts: (prev.attempts || 0) + 1,
        bestScore: Math.max(rawPct, prev.bestScore || 0),
        history: [...(prev.history || []), { ts: now, pct: rawPct, mode }].slice(-20),
      };
    },
    getAllSrsCards() { return Object.values(this.srs); },
    getDueCards(now) { return this.getAllSrsCards().filter(c => c.nextReview && c.nextReview <= (now || Date.now())).sort((a, b) => a.nextReview - b.nextReview); },
    getUpcomingCards(now) { return this.getAllSrsCards().filter(c => c.nextReview && c.nextReview > (now || Date.now())).sort((a, b) => a.nextReview - b.nextReview); },

    record(category, mode, score, total, detail) {
      this.attempts.push({
        category, mode, score, total, detail: detail || "",
        pct: total > 0 ? score / total : 0,
        ts: Date.now(),
      });
      // Update spaced repetition (mode affects weighting)
      this.updateSrs(category, detail, score, total, mode);
      this._save();
    },
    getByCategory(cat) { return this.attempts.filter(a => a.category === cat); },
    getByMode(mode) { return this.attempts.filter(a => a.mode === mode); },
    getRecent(n) { return this.attempts.slice(-n); },
    totalAttempts() { return this.attempts.length; },
    overallAccuracy() {
      if (this.attempts.length === 0) return 0;
      const totalScore = this.attempts.reduce((s, a) => s + a.score, 0);
      const totalMax = this.attempts.reduce((s, a) => s + a.total, 0);
      return totalMax > 0 ? totalScore / totalMax : 0;
    },
    // Proficiency algorithm: accounts for ALL categories — unpracticed = 0%
    proficiency() {
      const allCats = ["vocab", "phrases", "verbs", "culture"];
      if (this.attempts.length === 0) return {
        score: 0, level: "🔰 Just beginning",
        accuracy: 0, coverage: 0, trend: 0.5, volume: 0,
        breakdown: Object.fromEntries(allCats.map(c => [c, { accuracy: 0, attempts: 0, best: 0, recent: 0 }])),
      };

      // Per-category breakdown (including unpracticed as 0)
      const breakdown = {};
      for (const cat of allCats) {
        const catAttempts = this.getByCategory(cat);
        if (catAttempts.length === 0) {
          breakdown[cat] = { accuracy: 0, attempts: 0, best: 0, recent: 0 };
        } else {
          let wS = 0, wT = 0;
          catAttempts.forEach(a => { const w = a.mode === "match" ? 0.6 : 1.0; wS += a.score * w; wT += a.total * w; });
          breakdown[cat] = {
            accuracy: wT > 0 ? wS / wT : 0,
            attempts: catAttempts.length,
            best: Math.max(...catAttempts.map(a => a.pct)),
            recent: catAttempts.slice(-1)[0]?.pct || 0,
          };
        }
      }

      // 1. Accuracy (45% weight) — average across ALL 4 categories (unpracticed = 0)
      const accuracy = allCats.reduce((sum, c) => sum + breakdown[c].accuracy, 0) / allCats.length;

      // 2. Coverage (25% weight) — how many of 4 categories practiced
      const practiced = allCats.filter(c => breakdown[c].attempts > 0);
      const coverage = practiced.length / allCats.length;

      // 3. Recency trend (15% weight) — are you improving?
      let trend = 0.5;
      if (this.attempts.length >= 4) {
        const half = Math.floor(this.attempts.length / 2);
        const firstHalf = this.attempts.slice(0, half);
        const secondHalf = this.attempts.slice(half);
        const avgFirst = firstHalf.reduce((s, a) => s + a.pct, 0) / firstHalf.length;
        const avgSecond = secondHalf.reduce((s, a) => s + a.pct, 0) / secondHalf.length;
        trend = 0.5 + (avgSecond - avgFirst) * 0.5;
        trend = Math.max(0, Math.min(1, trend));
      }

      // 4. Volume (15% weight) — total rounds with diminishing returns
      //    Expect ~5 rounds per category (20 total) for full volume credit
      const volumeRaw = Math.min(1, this.attempts.length / 20);
      const volume = Math.sqrt(volumeRaw);

      const score = Math.round((accuracy * 0.45 + coverage * 0.25 + trend * 0.15 + volume * 0.15) * 100);

      const levels = [
        [90, "🏆 Excellent — Exam ready!"],
        [75, "🌟 Strong — Almost there"],
        [60, "💪 Good — Keep practicing"],
        [40, "📚 Developing — Focus on weak areas"],
        [20, "🌱 Getting started"],
        [0, "🔰 Just beginning"],
      ];
      const level = levels.find(([min]) => score >= min)?.[1] || "🔰 Just beginning";

      return { score, level, accuracy, coverage, trend, volume, breakdown };
    }
  };
}

      { title: "La laïcité — secularism in France", detail: "France has a strict separation of church and state since 1905. This affects daily life: religious symbols are restricted in public schools and government buildings. It's a core part of French national identity.", useful: "En France, la laïcité est un principe fondamental qui influence l'identité nationale." },

      { title: "Le système éducatif — the baccalauréat", detail: "French students take the baccalauréat exam at 17–18. The French school system is highly standardized nationwide. Education is seen as key to French republican values of equality.", useful: "Le baccalauréat est un examen très important dans la vie des jeunes Français." },
      { title: "Noms et prénoms — naming traditions", detail: "Until 1993, French parents had to choose from an approved list of first names. French family names often indicate regional origins. In many African francophone countries, names carry deep cultural and spiritual meaning.", useful: "Les traditions de prénoms varient beaucoup entre les pays francophones." },
      { title: "La négritude — Black Francophone identity", detail: "The Négritude movement was founded in 1930s Paris by Aimé Césaire (Martinique), Léopold Sédar Senghor (Senegal), and Léon-Gontran Damas (French Guiana). It celebrated Black identity and culture against colonial assimilation. Senghor became Senegal's first president.", useful: "Le mouvement de la négritude a célébré l'identité noire dans le monde francophone." },
      { title: "Les langues régionales de France", detail: "France has many regional languages: Breton (Brittany), Occitan (south), Alsatian (east), Basque and Catalan (southwest), Corsican, and Créole in overseas territories. These languages reflect rich regional identities, though French policy has historically favoured a single national language.", useful: "En France, il existe de nombreuses langues régionales comme le breton, l'occitan et le corse." },
      { title: "La baguette — symbol of French daily life", detail: "The French consume around 10 billion baguettes per year. In 2022, the art of making baguettes was added to UNESCO's Intangible Cultural Heritage list. The boulangerie is a cornerstone of every French neighbourhood.", useful: "La baguette est un symbole de la vie quotidienne en France — les Français en consomment des milliards chaque année." },
      { title: "Le Québec — French identity in North America", detail: "Québec is the only majority French-speaking province in Canada. Québécois identity is fiercely protected through language laws (Loi 101). Joual, the Québécois dialect, is distinct from European French. There was a sovereignty referendum in 1995 that nearly succeeded.", useful: "Au Québec, la langue française est protégée par des lois pour préserver l'identité francophone en Amérique du Nord." },

      { title: "Le 14 juillet — Bastille Day", detail: "France's national day celebrates the storming of the Bastille in 1789. There's a military parade on the Champs-Élysées, fireworks in every town, and public dances (bals des pompiers) at fire stations.", useful: "Le 14 juillet est la fête nationale française avec des défilés militaires et des feux d'artifice partout en France." },

      { title: "Le carnaval dans le monde francophone", detail: "Major carnivals include Nice, Québec (with Bonhomme the snowman), and across the Caribbean (Martinique, Guadeloupe, Haiti). Each has distinct traditions linked to local history. Mardi Gras in Louisiana has deep French roots.", useful: "Le Carnaval de Québec est le plus grand carnaval d'hiver au monde, avec sa mascotte Bonhomme." },
      { title: "Le Tour de France", detail: "The world's most famous cycling race since 1903, covering ~3,500 km over 3 weeks each July. The maillot jaune (yellow jersey) is iconic. Entire villages line the route — it's a massive cultural event, not just sport.", useful: "Le Tour de France est un événement sportif et culturel emblématique qui a lieu chaque année en juillet." },
      { title: "La culture du café", detail: "The French café is a social institution — people spend hours reading, talking, and watching the world go by. Un express (espresso) at the comptoir (bar) is a daily ritual. Café culture dates back centuries.", useful: "La culture du café en France est une tradition sociale importante dans la vie quotidienne." },
      { title: "La rentrée — back to school", detail: "September's rentrée is a major cultural moment — not just for students but for all of France. New books, TV shows, and political agendas all launch at la rentrée. Shops run special sales for school supplies.", useful: "La rentrée en septembre est un moment culturel important pour toute la France, pas seulement les étudiants." },
      { title: "Les marchés en plein air", detail: "Open-air markets are central to daily life in France and across francophone Africa. Most French towns have weekly markets with fresh produce, cheese, and artisanal goods. In Dakar, Marché Sandaga is one of West Africa's largest.", useful: "Les marchés en plein air sont au centre de la vie quotidienne en France et en Afrique francophone." },
      { title: "Le Ramadan dans le monde francophone", detail: "France has the largest Muslim population in Western Europe (~5-6 million). Ramadan is widely observed across francophone Africa — Senegal, Mali, Morocco, Tunisia. It shapes daily rhythms with iftar meals and community gatherings.", useful: "Le Ramadan est observé par des millions de personnes dans le monde francophone, en France et en Afrique." },
      { title: "Tabaski / Aïd al-Adha en Afrique francophone", detail: "Tabaski is one of the biggest celebrations across Muslim francophone Africa. Families buy a sheep, dress in new clothes, and share meals with neighbours and the poor. In Senegal, it's the most important holiday of the year.", useful: "La Tabaski est la fête la plus importante au Sénégal — les familles partagent un repas et célèbrent ensemble." },
      { title: "Noël dans le monde francophone", detail: "French Christmas traditions include le réveillon (Christmas Eve feast), la bûche de Noël (log cake), and Père Noël. In Québec, tourtière (meat pie) is traditional. In the Caribbean, le chanté Nwel involves communal carol singing.", useful: "Les traditions de Noël varient dans le monde francophone — le réveillon et la bûche de Noël sont typiquement français." },
      { title: "Le Festival de Cannes", detail: "The world's most prestigious film festival, held annually in May on the French Riviera. The Palme d'Or is the highest prize. It showcases French and international cinema and draws global media attention.", useful: "Le Festival de Cannes est le plus prestigieux festival de cinéma au monde." },
      { title: "La musique francophone — global diversity", detail: "French music spans: chanson française (Piaf, Brel), raï from Algeria (Khaled), mbalax from Senegal (Youssou N'Dour), kompa from Haiti, zouk from the Antilles, and French rap — the 2nd largest hip-hop market after the US.", useful: "La musique francophone est très diverse — du raï algérien au zouk antillais en passant par le rap français." },
      { title: "La teranga sénégalaise — hospitality", detail: "Teranga means hospitality in Wolof and is Senegal's national value. Guests are always welcomed with food and ataya (tea ceremony). Senegal is known as le Pays de la Teranga. This extends to their national football team spirit.", useful: "Au Sénégal, la teranga — l'hospitalité — est une valeur nationale très importante." },
      { title: "Le sport francophone — beyond football", detail: "Football is #1 across the francophone world (France won the World Cup in 1998 & 2018). But Québec is hockey-mad (Montreal Canadiens). Senegal won the Africa Cup of Nations in 2022. Pétanque is beloved across southern France.", useful: "Le football unit les pays francophones, mais chaque région a aussi ses sports préférés comme le hockey au Québec." },
      { title: "La pâtisserie française", detail: "French pastry is world-renowned: croissants, éclairs, macarons, tarte tatin, mille-feuille. Each region has specialties — kouign-amann in Brittany, cannelés in Bordeaux. Pâtisseries are found on every street corner.", useful: "La pâtisserie française est mondialement connue — chaque région a ses spécialités comme le cannelé à Bordeaux." },

      { title: "Le TGV — high-speed innovation", detail: "France pioneered high-speed rail with the TGV (Train à Grande Vitesse) in 1981, reaching 320 km/h. It revolutionized European travel and reduced domestic flights. The network connects all major French cities.", useful: "Le TGV est un exemple d'ingéniosité française — il connecte les villes à grande vitesse depuis 1981." },
      { title: "Le cinéma — a French invention", detail: "The Lumière brothers invented cinema in Lyon in 1895 with the Cinématographe. France protects its film industry with screen quotas and subsidies. French cinema emphasizes artistic expression over commercial blockbusters.", useful: "Le cinéma est une invention française des frères Lumière en 1895 à Lyon." },
      { title: "La mode et le luxe", detail: "Paris is the global capital of fashion. French luxury brands (Chanel, Louis Vuitton, Dior, Hermès) shape global trends. Paris Fashion Week is one of the 'Big Four.' The industry employs over 1 million people in France.", useful: "Paris est la capitale mondiale de la mode, avec des marques emblématiques comme Chanel et Dior." },

      { title: "L'architecture francophone", detail: "French architecture spans from Gothic cathedrals (Notre-Dame) to Haussmann's 19th-century Paris boulevards to modern icons like the Centre Pompidou and the Louvre Pyramid. In Africa, the Great Mosque of Djenné (Mali) is a UNESCO masterpiece of Sudano-Sahelian architecture.", useful: "L'architecture francophone va des cathédrales gothiques à la Grande Mosquée de Djenné au Mali." },
      { title: "La médecine — French pioneers", detail: "Louis Pasteur invented pasteurization and developed the rabies vaccine. France created Médecins Sans Frontières (Doctors Without Borders) in 1971, which won the Nobel Peace Prize. The Institut Pasteur continues groundbreaking research.", useful: "Louis Pasteur et Médecins Sans Frontières montrent la contribution française à la médecine mondiale." },

      { title: "La grève — French protest culture", detail: "Strikes and demonstrations are deeply embedded in French civic culture. The right to strike is constitutional. Transport strikes, student protests, and agricultural blockades are regular occurrences. The gilets jaunes (yellow vest) movement in 2018 was a recent major example.", useful: "La grève est une tradition française — le droit de manifester est un droit constitutionnel." },
      { title: "Le système politique français", detail: "France is a semi-presidential republic. The President has significant powers. France has 18 régions. Political life features a strong left-right divide. Voting is not compulsory but civic participation is valued. Mayors play an important local role.", useful: "La France est une république semi-présidentielle où le président a beaucoup de pouvoir." },
      { title: "La famille francophone — changing structures", detail: "French families have evolved: the PACS (civil partnership) since 1999, same-sex marriage since 2013 (le mariage pour tous). France has one of Europe's highest birth rates, supported by generous family benefits (allocations familiales) and state-funded childcare.", useful: "La famille en France évolue — le mariage pour tous existe depuis 2013 et l'État soutient les familles." },
      { title: "Les médias francophones", detail: "France has a strong public broadcasting tradition (France Télévisions, Radio France, France 24, RFI). RFI and TV5Monde broadcast across the francophone world. Press freedom is protected but media concentration is a growing concern.", useful: "Les médias francophones comme RFI et TV5Monde connectent les pays francophones du monde entier." },
      { title: "Le bénévolat et le service civique", detail: "France has over 1.3 million associations (non-profits). Le service civique allows young people aged 16-25 to volunteer for 6-12 months on social missions. About 150,000 young French people participate annually. It's seen as a path to active citizenship.", useful: "Le service civique permet aux jeunes Français de faire du bénévolat pour aider la société." },

      { title: "Les DOM-TOM et la biodiversité", detail: "France's overseas territories contain exceptional biodiversity — the coral reefs of New Caledonia, rainforests of French Guiana, and endemic species of Réunion. They face threats from rising sea levels, coral bleaching, and deforestation. France has the 2nd largest maritime zone in the world thanks to these territories.", useful: "Les territoires d'outre-mer français possèdent une biodiversité exceptionnelle mais menacée par le changement climatique." },

      { title: "La déforestation au Congo", detail: "The Congo Basin (including DRC, Republic of Congo, Cameroon, Gabon) holds the world's second-largest rainforest. It absorbs more CO2 than the Amazon. Deforestation from logging, mining, and agriculture threatens this vital ecosystem.", useful: "La forêt du bassin du Congo est essentielle pour le climat mondial mais menacée par la déforestation." },

      { title: "Le commerce équitable — fair trade", detail: "France is one of the world's largest markets for fair trade products (café, chocolat, bananes). Fairtrade labels (Max Havelaar) are widely recognized. Many francophone African countries produce fair trade goods — Ivory Coast is the world's largest cocoa producer.", useful: "Le commerce équitable est important en France — les consommateurs achètent des produits labellisés pour aider les producteurs." },
      { title: "La pollution plastique et la loi anti-gaspillage", detail: "France passed an ambitious anti-waste law in 2020, banning single-use plastics progressively. By 2040, all single-use plastic packaging should be eliminated. France also requires supermarkets to donate unsold food rather than destroy it.", useful: "La France a interdit les plastiques à usage unique et oblige les supermarchés à donner la nourriture non vendue." },
      { title: "Le Sahel — désertification et climat", detail: "The Sahel region (Mali, Niger, Burkina Faso, Chad) faces severe desertification and climate stress. The Great Green Wall project aims to plant trees across 8,000 km of Africa to stop desert expansion. Millions of francophone Africans are climate refugees.", useful: "La Grande Muraille Verte est un projet pour lutter contre la désertification dans le Sahel francophone." },
      { title: "Madagascar — biodiversité unique menacée", detail: "Madagascar, a francophone island nation, has 90% of wildlife found nowhere else on Earth (lemurs, baobabs, chameleons). However, 90% of its original forests have been destroyed. It's one of the world's top biodiversity hotspots and conservation priorities.", useful: "Madagascar est un pays francophone avec une biodiversité unique au monde, mais gravement menacée." },
      { title: "Les parcs nationaux français", detail: "France has 11 national parks protecting exceptional landscapes — from the Alps (Vanoise, Écrins) to tropical forests (Guadeloupe, Guyane). The Calanques near Marseille became a national park in 2012. These parks balance conservation with tourism.", useful: "La France a onze parcs nationaux qui protègent des paysages exceptionnels, des Alpes aux forêts tropicales." },
      { title: "L'urbanisation en Afrique francophone", detail: "Francophone African cities are growing rapidly — Kinshasa, Abidjan, and Dakar are among the world's fastest-growing urban areas. This creates challenges: housing, transport, sanitation, and employment. But it also drives innovation and cultural creativity.", useful: "L'urbanisation rapide en Afrique francophone crée des défis mais aussi des opportunités d'innovation." },
      { title: "La Francophonie et les droits de l'homme", detail: "France's Declaration of the Rights of Man and of the Citizen (1789) influenced human rights globally. However, France's colonial history complicates this legacy. Today, the OIF promotes democracy and human rights across francophone countries, though challenges remain.", useful: "La Déclaration des droits de l'homme de 1789 a influencé le monde entier, mais l'histoire coloniale complique cet héritage." },
      { title: "Le tourisme durable en France", detail: "France is the world's most-visited country (~90 million tourists/year). Overtourism threatens places like Mont Saint-Michel and the Riviera. France is promoting sustainable tourism: eco-labels, off-season travel, and lesser-known destinations.", useful: "La France est le pays le plus visité au monde et développe le tourisme durable pour protéger ses sites." },
    ]

// ─── Mastery Recall — cycles incorrect items until all correct ────────────────

function MasteryRecall({ items, category, detail, color }) {
  // items: [{ front, back }] — front shown first, tap to flip, mark known/unknown
  const stats = useStats();
  const [pool, setPool] = useState(() => {
    const list = [...items];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  });
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [round, setRound] = useState(1);
  const [mastered, setMastered] = useState(new Set());
  const [wrong, setWrong] = useState([]);
  const [totalAttempts, setTotalAttempts] = useState(0);
  const [firstRoundCorrect, setFirstRoundCorrect] = useState(0);

  const card = pool[index];
  const done = mastered.size >= items.length;

  useEffect(() => {
    if (done) { SFX.complete(); stats.record(category, "mastery", items.length, items.length + (totalAttempts - items.length), detail); }
  }, [done]);

  const mark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setTotalAttempts(t => t + 1);
    if (correct) {
      setMastered(prev => new Set([...prev, card.id]));
      if (round === 1) setFirstRoundCorrect(c => c + 1);
    } else {
      setWrong(prev => [...prev, card]);
    }
    setFlipped(false);

    if (index + 1 < pool.length) {
      setIndex(index + 1);
    } else {
      // End of current pass — check if there are wrongs to cycle
      if (!correct) {
        // This last card was wrong, so wrong includes it
        const nextPool = [...wrong, card];
        // Shuffle
        for (let i = nextPool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nextPool[i], nextPool[j]] = [nextPool[j], nextPool[i]]; }
        setPool(nextPool);
        setWrong([]);
        setIndex(0);
        setRound(r => r + 1);
      } else if (wrong.length > 0) {
        const nextPool = [...wrong];
        for (let i = nextPool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nextPool[i], nextPool[j]] = [nextPool[j], nextPool[i]]; }
        setPool(nextPool);
        setWrong([]);
        setIndex(0);
        setRound(r => r + 1);
      }
      // else done — all mastered
    }
  };

  const restart = () => {
    const list = [...items];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    setPool(list); setIndex(0); setFlipped(false); setRound(1);
    setMastered(new Set()); setWrong([]); setTotalAttempts(0); setFirstRoundCorrect(0);
  };

  // Keyboard shortcuts
  const masteryMarkRef = useRef(mark);
  masteryMarkRef.current = mark;
  const masteryFlippedRef = useRef(flipped);
  masteryFlippedRef.current = flipped;
  useEffect(() => {
    if (done) return;
    const handler = (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); setFlipped(f => !f); SFX.flip(); }
      if (masteryFlippedRef.current && (e.key === "1" || e.key === "ArrowLeft")) masteryMarkRef.current(false);
      if (masteryFlippedRef.current && (e.key === "2" || e.key === "ArrowRight")) masteryMarkRef.current(true);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [done]);

  if (done) {
    const efficiency = Math.round((items.length / totalAttempts) * 100);
    return (
      <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(52,211,153,0.3)" }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>🏆</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#34d399" }}>
          All mastered!
        </div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#94a3b8", marginTop: 8 }}>
          {items.length} items in {round} round{round !== 1 ? "s" : ""} · {totalAttempts} total attempts
        </div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 20, marginBottom: 20 }}>
          <div style={{ padding: "10px 16px", borderRadius: 8, background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.2)", textAlign: "center" }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px" }}>1st round</div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#a5b4fc" }}>{firstRoundCorrect}/{items.length}</div>
          </div>
          <div style={{ padding: "10px 16px", borderRadius: 8, background: "rgba(52,211,153,0.08)", border: "1px solid rgba(52,211,153,0.2)", textAlign: "center" }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px" }}>Efficiency</div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#34d399" }}>{efficiency}%</div>
          </div>
          <div style={{ padding: "10px 16px", borderRadius: 8, background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)", textAlign: "center" }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px" }}>Rounds</div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#f59e0b" }}>{round}</div>
          </div>
        </div>
        <button onClick={restart} style={{
          padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
          background: `linear-gradient(135deg, ${color}, ${color}bb)`, color: "#fff",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
        }}>Try Again</button>
      </div>
    );
  }

  return (
    <div>
      {/* Header info */}
      <div style={{
        padding: "10px 14px", borderRadius: 8, marginBottom: 12,
        background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.12)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#94a3b8", lineHeight: 1.5 }}>
          Keep going until <span style={{ color: "#34d399", fontWeight: 600 }}>every item is correct</span>. Wrong answers cycle back. Round <span style={{ color: "#a5b4fc", fontWeight: 600 }}>{round}</span> · {mastered.size}/{items.length} mastered
        </div>
      </div>

      {/* Progress */}
      <div style={{ display: "flex", gap: 3, marginBottom: 16 }}>
        {items.map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 4, borderRadius: 2, transition: "background 0.3s",
            background: mastered.has(items[i].id) ? "#34d399" : "#1e293b",
          }} />
        ))}
      </div>

      {/* Card */}
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b", textAlign: "right", marginBottom: 6 }}>
        {index + 1}/{pool.length} this round
      </div>
      <div onClick={() => { setFlipped(!flipped); SFX.flip(); }} style={{
        minHeight: 200, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
        padding: "40px 24px", borderRadius: 16, cursor: "pointer", textAlign: "center", transition: "all 0.3s",
        background: flipped ? `linear-gradient(145deg, ${color}15, ${color}08)` : "linear-gradient(145deg, #1e293b, #111827)",
        border: `1.5px solid ${flipped ? `${color}40` : "rgba(51,65,85,0.5)"}`,
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: "#64748b", marginBottom: 14 }}>
          {flipped ? "Answer" : "Question"}{round > 1 ? ` · Round ${round}` : ""}
        </div>
        <div style={{ fontSize: flipped ? 20 : 24, fontWeight: 700, color: flipped ? "#cbd5e1" : "#f1f5f9", lineHeight: 1.4 }}>
          {flipped ? card.back : card.front}
        </div>
        {!flipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#475569", marginTop: 20 }}>Tap or Space to flip · 1/2 to answer</div>}
      </div>

      {flipped && (
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <button onClick={() => mark(false)} style={{

// ─── Rolling Match — show 6, swap out matched 3, until pool exhausted ─────────

function RollingMatch({ allPairs, category, detail, color, leftLabel, rightLabel }) {
  const stats = useStats();
  const VISIBLE = Math.min(6, allPairs.length);
  const SWAP_AT = Math.min(3, Math.ceil(VISIBLE / 2));

  const shuffledRef = useRef(null);
  if (!shuffledRef.current) {
    const list = [...allPairs];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    shuffledRef.current = list;
  }
  const shuffled = shuffledRef.current;

  const [slots, setSlots] = useState(() => shuffled.slice(0, VISIBLE));
  const [queue, setQueue] = useState(() => shuffled.slice(VISIBLE));
  const [selectedL, setSelectedL] = useState(null);
  const [matched, setMatched] = useState(new Set()); // slot indices matched this wave
  const [wrong, setWrong] = useState(null);
  const [totalMatched, setTotalMatched] = useState(0);
  const [rightOrder, setRightOrder] = useState(() => {
    const r = Array.from({ length: VISIBLE }, (_, i) => i);
    for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; }
    return r;
  });
  const [swapping, setSwapping] = useState(false);

  const done = totalMatched >= shuffled.length;

  useEffect(() => {
    if (done) { SFX.complete(); stats.record(category, "match", shuffled.length, shuffled.length, detail); }
  }, [done]);

  const reshuffleRight = (count) => {
    const r = Array.from({ length: count }, (_, i) => i);
    for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; }
    return r;
  };

  const handleL = (idx) => {
    if (matched.has(idx) || swapping) return;
    setSelectedL(idx);
    setWrong(null);
  };

  const handleR = (slotIdx) => {
    if (selectedL === null || matched.has(slotIdx) || swapping) return;
    // Correct if same pair
    if (slots[selectedL]?.id === slots[slotIdx]?.id) {
      SFX.match();
      const newMatched = new Set([...matched, selectedL]);
      if (selectedL !== slotIdx) newMatched.add(slotIdx); // shouldn't differ, but safety
      setMatched(newMatched);
      setSelectedL(null);
      setWrong(null);
      const newTotal = totalMatched + 1;
      setTotalMatched(newTotal);

      // Check swap threshold
      if (newMatched.size >= SWAP_AT && queue.length > 0 && newTotal < shuffled.length) {
        setSwapping(true);
        setTimeout(() => {
          const nextSlots = [...slots];
          const nextQueue = [...queue];
          const matchedIndices = [...newMatched];
          for (const mi of matchedIndices) {
            if (nextQueue.length > 0) {
              nextSlots[mi] = nextQueue.shift();
            }
          }
          setSlots(nextSlots);
          setQueue(nextQueue);
          setMatched(new Set());
          setRightOrder(reshuffleRight(nextSlots.length));
          setSwapping(false);
        }, 600);
      }
    } else {
      SFX.wrong();
      setWrong({ l: selectedL, r: slotIdx });
      setTimeout(() => { setWrong(null); setSelectedL(null); }, 500);
    }
  };

  const restart = () => {
    const list = [...allPairs];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    shuffledRef.current = list;
    setSlots(list.slice(0, VISIBLE));
    setQueue(list.slice(VISIBLE));
    setSelectedL(null);
    setMatched(new Set());
    setWrong(null);
    setTotalMatched(0);
    setRightOrder(reshuffleRight(VISIBLE));
    setSwapping(false);
  };

  if (done) return (
    <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(52,211,153,0.3)" }}>
      <div style={{ fontSize: 40, marginBottom: 12 }}>🎉</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#34d399" }}>
        All {shuffled.length} matched!
      </div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>Full word bank complete</div>
      <button onClick={restart} style={{
        padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
        background: `linear-gradient(135deg, ${color}, ${color}bb)`, color: "#fff",
        fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
      }}>Play Again</button>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b" }}>{totalMatched}/{shuffled.length} matched</span>
        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#64748b" }}>{queue.length} in queue</span>
      </div>
      <div style={{ background: "#1e293b", borderRadius: 4, height: 6, marginBottom: 16, overflow: "hidden" }}>
        <div style={{ width: `${(totalMatched / shuffled.length) * 100}%`, height: "100%", borderRadius: 4, background: "#34d399", transition: "width 0.4s" }} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>{leftLabel || "Left"}</div>
          {slots.map((item, i) => {
            const isM = matched.has(i);
            const isSel = selectedL === i;
            const isW = wrong?.l === i;
            return (
              <button key={`${item.id}-${i}-l`} onClick={() => handleL(i)} style={{
                padding: "10px 12px", borderRadius: 8, textAlign: "left",
                cursor: isM || swapping ? "default" : "pointer",
                border: isM ? "1.5px solid #34d399" : isW ? "1.5px solid #ef4444" : isSel ? `1.5px solid ${color}` : "1.5px solid rgba(51,65,85,0.4)",
                background: isM ? "rgba(52,211,153,0.08)" : isW ? "rgba(239,68,68,0.08)" : isSel ? `${color}10` : "#111827",
                opacity: isM ? 0.35 : 1,
                fontSize: 13, fontWeight: 600, color: isM ? "#34d399" : "#e2e8f0",
                fontFamily: "'Libre Baskerville', serif", transition: "all 0.25s",
              }}>{item.left}</button>
            );
          })}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>{rightLabel || "Right"}</div>
          {rightOrder.filter(i => i < slots.length).map(i => {
            const item = slots[i];
            const isM = matched.has(i);
            const isW = wrong?.r === i;
            return (
              <button key={`${item.id}-${i}-r`} onClick={() => handleR(i)} style={{
                padding: "10px 12px", borderRadius: 8, textAlign: "left",
                cursor: isM || swapping ? "default" : "pointer",
                border: isM ? "1.5px solid #34d399" : isW ? "1.5px solid #ef4444" : "1.5px solid rgba(51,65,85,0.4)",
                background: isM ? "rgba(52,211,153,0.08)" : isW ? "rgba(239,68,68,0.08)" : "#111827",
                opacity: isM ? 0.35 : 1,
                fontSize: 12, fontWeight: 500, color: isM ? "#34d399" : "#cbd5e1",
                fontFamily: "'DM Sans', sans-serif", transition: "all 0.25s",
              }}>{item.right}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Sentence Builder — arrange word tiles ───────────────────────────────────
function SentenceBuilder({ activeCat, setActiveCat }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = (activeCat ? PHRASES.filter(p => p.cat === activeCat) : [...PHRASES])
      .filter(p => p.fr.split(" ").length >= 3 && p.fr.split(" ").length <= 10);
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeCat]);

  const [index, setIndex] = useState(0);
  const [placed, setPlaced] = useState([]);
  const [score, setScore] = useState({ yes: 0, no: 0 });
  const [showResult, setShowResult] = useState(false);

  const card = pool[index];
  const done = index >= pool.length || !card;

  const words = useMemo(() => {
    if (!card) return [];
    const w = card.fr.split(" ").map((word, i) => ({ word, id: i }));
    const shuffled = [...w];
    for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
    return shuffled;
  }, [card, index]);

  const available = words.filter(w => !placed.includes(w.id));
  const placedWords = placed.map(id => words.find(w => w.id === id));
  const builtSentence = placedWords.map(w => w?.word || "").join(" ");

  const checkAnswer = () => {
    const correct = builtSentence.toLowerCase().trim() === card.fr.toLowerCase().trim();
    if (correct) SFX.correct(); else SFX.wrong();
    setShowResult(true);
    setScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
  };

  const next = () => {
    setPlaced([]);
    setShowResult(false);
    setIndex(i => i + 1);
  };

  const isCorrect = showResult && builtSentence.toLowerCase().trim() === card.fr.toLowerCase().trim();

  useEffect(() => {
    if (done && (score.yes + score.no > 0)) stats.record("phrases", "build", score.yes, score.yes + score.no, activeCat || "all");
  }, [done]);

  if (done) return (
    <div>
      <CatFilter activeCat={activeCat} setActiveCat={setActiveCat} />
      <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>{score.yes >= score.no ? "🎉" : "💪"}</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#e2e8f0" }}>{score.yes}/{score.yes + score.no}</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>
          sentences built correctly
        </div>
        <button onClick={() => { setIndex(0); setPlaced([]); setScore({ yes: 0, no: 0 }); setShowResult(false); }} style={{
          padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
          background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
        }}>Play Again</button>
      </div>
    </div>
  );

  return (
    <div>
      <CatFilter activeCat={activeCat} setActiveCat={setActiveCat} />

      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        <div style={{ flex: score.yes, height: 4, borderRadius: 2, background: "#34d399", transition: "flex 0.3s" }} />
        <div style={{ flex: score.no, height: 4, borderRadius: 2, background: "#f87171", transition: "flex 0.3s" }} />
        <div style={{ flex: Math.max(0, pool.length - score.yes - score.no), height: 4, borderRadius: 2, background: "#1e293b" }} />
      </div>

      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginBottom: 4 }}>{index + 1}/{pool.length}</div>

      {/* English prompt */}
      <div style={{
        padding: "16px 20px", borderRadius: 12, marginBottom: 16, textAlign: "center",
        background: "linear-gradient(145deg, #1e293b, #111827)", border: "1px solid rgba(51,65,85,0.5)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 8 }}>
          Build this sentence in French
        </div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", lineHeight: 1.5 }}>{card.en}</div>
      </div>

      {/* Drop zone */}
      <div style={{
        minHeight: 52, padding: "12px 14px", borderRadius: 10, marginBottom: 16, display: "flex", flexWrap: "wrap", gap: 6,
        background: showResult ? (isCorrect ? "rgba(52,211,153,0.06)" : "rgba(239,68,68,0.06)") : "rgba(99,102,241,0.04)",
        border: `1.5px dashed ${showResult ? (isCorrect ? "#34d399" : "#ef4444") : "rgba(99,102,241,0.3)"}`,
      }}>
        {placed.length === 0 && <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#475569" }}>Tap words below to build the sentence...</span>}
        {placedWords.map((w, i) => (
          <button key={i} onClick={() => { if (!showResult) setPlaced(placed.filter((_, j) => j !== i)); }} style={{
            padding: "6px 12px", borderRadius: 6, border: "1px solid rgba(99,102,241,0.4)",
            background: "rgba(99,102,241,0.1)", color: "#a5b4fc", cursor: showResult ? "default" : "pointer",
            fontFamily: "'Libre Baskerville', serif", fontSize: 14, fontWeight: 600,
          }}>{w?.word}</button>
        ))}
      </div>

      {/* Show correct answer if wrong */}
      {showResult && !isCorrect && (
        <div style={{
          padding: "10px 14px", borderRadius: 8, marginBottom: 12,
          background: "rgba(52,211,153,0.06)", border: "1px solid rgba(52,211,153,0.2)",
        }}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, color: "#64748b", marginBottom: 4 }}>Correct:</div>
          <div style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 14, fontWeight: 600, color: "#34d399" }}>{card.fr}</div>
        </div>
      )}

      {/* Available tiles */}
      {!showResult && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
          {available.map(w => (
            <button key={w.id} onClick={() => { setPlaced([...placed, w.id]); SFX.tap(); }} style={{
              padding: "8px 14px", borderRadius: 8, cursor: "pointer",
              border: "1.5px solid rgba(51,65,85,0.5)", background: "#111827",
              color: "#e2e8f0", fontFamily: "'Libre Baskerville', serif", fontSize: 14, fontWeight: 600,
              transition: "all 0.15s",
            }}>{w.word}</button>
          ))}
        </div>
      )}

      {/* Actions */}
      {!showResult ? (
        <button onClick={checkAnswer} disabled={placed.length === 0} style={{
          width: "100%", padding: "14px", borderRadius: 10, border: "none", cursor: placed.length > 0 ? "pointer" : "default",
          background: placed.length > 0 ? "linear-gradient(135deg, #6366f1, #818cf8)" : "#1e293b",
          color: placed.length > 0 ? "#fff" : "#475569",
          fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
        }}>Check Sentence</button>
      ) : (
        <button onClick={next} style={{

function PhraseRecall({ activeCat, setActiveCat }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = activeCat ? PHRASES.filter(p => p.cat === activeCat) : [...PHRASES];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeCat]);

  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showFr, setShowFr] = useState(true);
  const [score, setScore] = useState({ yes: 0, no: 0 });

  const card = pool[index];
  const front = showFr ? card.en : card.fr;
  const back = showFr ? card.fr : card.en;
  const done = score.yes + score.no >= pool.length;

  useEffect(() => {
    if (done) { SFX.complete(); stats.record("phrases", "recall", score.yes, pool.length, activeCat || "all"); }
  }, [done]);

  const mark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
    setFlipped(false);
    if (index + 1 < pool.length) setIndex(index + 1);
  };

  const restart = () => { setIndex(0); setFlipped(false); setScore({ yes: 0, no: 0 }); };

  // Keyboard shortcuts
  const markRef = useRef(mark);
  markRef.current = mark;
  const flippedRef = useRef(flipped);
  flippedRef.current = flipped;
  useEffect(() => {
    if (done) return;
    const handler = (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); setFlipped(f => !f); SFX.flip(); }
      if (flippedRef.current && (e.key === "1" || e.key === "ArrowLeft")) markRef.current(false);
      if (flippedRef.current && (e.key === "2" || e.key === "ArrowRight")) markRef.current(true);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [done]);

  if (done) return (
    <div>
      <CatFilter activeCat={activeCat} setActiveCat={setActiveCat} />
      <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>{score.yes > score.no ? "🎉" : "💪"}</div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#e2e8f0" }}>
          {score.yes}/{pool.length} correct
        </div>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>
          {score.yes === pool.length ? "Perfect score!" : `${score.no} to review — keep going!`}
        </div>
        <button onClick={restart} style={{
          padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
          background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
          fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
        }}>Try Again</button>
      </div>
    </div>
  );

  return (
    <div>
      <CatFilter activeCat={activeCat} setActiveCat={setActiveCat} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <button onClick={() => setShowFr(!showFr)} style={{
          padding: "6px 14px", borderRadius: 8, border: "1px solid rgba(99,102,241,0.3)",
          background: "rgba(99,102,241,0.08)", color: "#a5b4fc",
          fontSize: 12, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, cursor: "pointer",
        }}>{showFr ? "See EN → recall FR" : "See FR → recall EN"}</button>
        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{index + 1}/{pool.length}</span>
      </div>

      {/* Progress */}
      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        <div style={{ flex: score.yes, height: 4, borderRadius: 2, background: "#34d399", transition: "flex 0.3s" }} />
        <div style={{ flex: score.no, height: 4, borderRadius: 2, background: "#f87171", transition: "flex 0.3s" }} />
        <div style={{ flex: Math.max(0, pool.length - score.yes - score.no), height: 4, borderRadius: 2, background: "#1e293b", transition: "flex 0.3s" }} />
      </div>

      <div onClick={() => { setFlipped(!flipped); SFX.flip(); }} style={{
        minHeight: 180, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
        padding: "36px 24px", borderRadius: 16, cursor: "pointer", textAlign: "center", transition: "all 0.3s",
        background: flipped ? "rgba(99,102,241,0.06)" : "linear-gradient(145deg, #1e293b, #111827)",
        border: `1.5px solid ${flipped ? "rgba(99,102,241,0.3)" : "rgba(51,65,85,0.5)"}`,
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: "#64748b", marginBottom: 14 }}>
          {flipped ? (showFr ? "Français" : "English") : (showFr ? "English" : "Français")}
        </div>
        <div style={{ fontSize: flipped ? 18 : 16, fontWeight: 700, color: flipped ? "#a5b4fc" : "#f1f5f9", lineHeight: 1.5 }}>
          {flipped ? back : front}
        </div>
        {!flipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#475569", marginTop: 16 }}>Tap or Space to flip · 1/2 to answer</div>}
      </div>

      {flipped && (
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <button onClick={() => mark(false)} style={{
            flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(239,68,68,0.4)",
            background: "#111827", color: "#f87171", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>✗ Didn't know (1)</button>
          <button onClick={() => mark(true)} style={{
            flex: 1, padding: "14px", borderRadius: 10, border: "1px solid rgba(52,211,153,0.4)",
            background: "#111827", color: "#34d399", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>✓ Knew it (2)</button>
        </div>
      )}
    </div>
  );
}

function PhraseFill({ activeCat, setActiveCat }) {
  const stats = useStats();
  const pool = useMemo(() => {
    const list = activeCat ? PHRASES.filter(p => p.cat === activeCat) : [...PHRASES];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }, [activeCat]);

  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const normalize = (s) => s.toLowerCase().trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");

  const checkAnswer = (input, target) => {
    const ni = normalize(input);
    const nt = normalize(target);
    if (ni === nt) return "exact";
    if (nt.includes(ni) && ni.length > nt.length * 0.5) return "close";
    // check if first meaningful words match
    const wi = ni.split(" ");
    const wt = nt.split(" ");
    let matched = 0;
    for (const w of wi) { if (wt.includes(w)) matched++; }
    if (matched >= wt.length * 0.6) return "close";
    return "wrong";
  };

  const score = submitted ? pool.filter((p, i) => {
    const r = checkAnswer(answers[i] || "", p.fr);
    return r === "exact" || r === "close";
  }).length : 0;

  useEffect(() => {
    if (submitted) stats.record("phrases", "type", score, pool.length, activeCat || "all");
  }, [submitted]);

  const reset = () => { setAnswers({}); setSubmitted(false); };

  return (
    <div>
      <CatFilter activeCat={activeCat} setActiveCat={setActiveCat} />
      <div style={{
        padding: "14px 16px", borderRadius: 10, marginBottom: 16,
        background: "linear-gradient(135deg, #1e1b4b, #0f172a)", border: "1px solid rgba(99,102,241,0.2)",
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
          Type the <span style={{ color: "#a5b4fc", fontWeight: 600 }}>French phrase</span> from the English prompt. Accents are optional — focus on getting the words right.
        </div>
      </div>

      {pool.map((p, i) => {
        const cat = CATEGORIES[p.cat];
        const result = submitted ? checkAnswer(answers[i] || "", p.fr) : null;
        return (
          <div key={i} style={{
            padding: "14px 16px", borderRadius: 10, marginBottom: 8,
            background: submitted ? (result === "exact" ? "rgba(52,211,153,0.05)" : result === "close" ? "rgba(250,204,21,0.05)" : "rgba(239,68,68,0.05)") : "#111827",
            border: `1px solid ${submitted ? (result === "exact" ? "rgba(52,211,153,0.3)" : result === "close" ? "rgba(250,204,21,0.3)" : "rgba(239,68,68,0.3)") : "rgba(51,65,85,0.4)"}`,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span style={{
                fontSize: 9, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, color: cat.color,
                background: `${cat.color}15`, padding: "2px 8px", borderRadius: 4, letterSpacing: "0.5px", textTransform: "uppercase",
              }}>{cat.icon}</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, color: "#e2e8f0" }}>{p.en}</span>
            </div>
            <input
              value={answers[i] || ""}
              onChange={e => setAnswers(prev => ({ ...prev, [i]: e.target.value }))}
              disabled={submitted}
              placeholder="Type the French…"
              style={{
                width: "100%", padding: "10px 12px", borderRadius: 8, boxSizing: "border-box",
                border: `1px solid ${submitted ? (result === "exact" ? "#34d399" : result === "close" ? "#facc15" : "#ef4444") : "rgba(99,102,241,0.2)"}`,
                background: "rgba(0,0,0,0.2)", color: "#e2e8f0", fontSize: 14,
                fontFamily: "'Libre Baskerville', serif", outline: "none",
              }}
            />
            {submitted && result !== "exact" && (
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, marginTop: 6, lineHeight: 1.5 }}>
                {result === "close" && <span style={{ color: "#facc15" }}>Almost! </span>}
                <span style={{ color: "#64748b" }}>Answer: </span>
                <span style={{ color: "#34d399", fontWeight: 600 }}>{p.fr}</span>
              </div>
            )}
            {submitted && result === "exact" && (
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#34d399", marginTop: 6, fontWeight: 600 }}>
                ✓ Correct!
              </div>
            )}
          </div>
        );
      })}

      {!submitted ? (
        <button onClick={() => setSubmitted(true)} style={{
          width: "100%", padding: "14px", borderRadius: 10, border: "none", marginTop: 8, cursor: "pointer",
          background: "linear-gradient(135deg, #6366f1, #818cf8)", color: "#fff",
          fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
        }}>Check Answers</button>
      ) : (
        <div>
          <div style={{
            textAlign: "center", padding: "16px", borderRadius: 10, marginTop: 8,
            background: "rgba(99,102,241,0.06)", border: "1px solid rgba(99,102,241,0.2)",
          }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: score === pool.length ? "#34d399" : "#a5b4fc" }}>
              {score}/{pool.length}
            </div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 4 }}>
              {score === pool.length ? "Perfect! 🎉" : "Review the ones you missed and try again!"}
            </div>
          </div>
          <button onClick={reset} style={{
            width: "100%", padding: "14px", borderRadius: 10, border: "1.5px solid rgba(99,102,241,0.3)",
            background: "transparent", color: "#a5b4fc", marginTop: 8, cursor: "pointer",
            fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
          }}>New Round</button>
        </div>
      )}
    </div>
  );
}

function TenseRecall({ tense, pronouns, pronounLabels }) {
  const stats = useStats();
  const cards = useMemo(() => {
    const verbs = tense.verbs.filter(v => !v.inf.startsWith("Structure"));
    const c = verbs.map(v => {
      const pi = Math.floor(Math.random() * pronouns.length);
      return { verb: v.inf, pronoun: pronounLabels[pi], answer: v[pronouns[pi]] };
    });
    for (let i = c.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [c[i], c[j]] = [c[j], c[i]]; }
    return c;
  }, [tense]);

  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [score, setScore] = useState({ yes: 0, no: 0 });
  const done = score.yes + score.no >= cards.length;

  const card = cards[index];

  const mark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
    setFlipped(false);
    if (index + 1 < cards.length) setIndex(index + 1);
  };
  const restart = () => { setIndex(0); setFlipped(false); setScore({ yes: 0, no: 0 }); };

  // Keyboard shortcuts
  const tenseMarkRef = useRef(mark);
  tenseMarkRef.current = mark;
  const tenseFlippedRef = useRef(flipped);
  tenseFlippedRef.current = flipped;
  useEffect(() => {
    if (done) return;
    const handler = (e) => {
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); setFlipped(f => !f); SFX.flip(); }
      if (tenseFlippedRef.current && (e.key === "1" || e.key === "ArrowLeft")) tenseMarkRef.current(false);
      if (tenseFlippedRef.current && (e.key === "2" || e.key === "ArrowRight")) tenseMarkRef.current(true);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [done]);

  useEffect(() => { if (done) { SFX.complete(); stats.record("verbs", "recall", score.yes, cards.length, tense.name); } }, [done]);

  if (done) return (
    <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
      <div style={{ fontSize: 40, marginBottom: 12 }}>{score.yes > score.no ? "🎉" : "💪"}</div>

function QuizMode({ tense, pronouns, pronounLabels }) {
  const stats = useStats();
  const [quizAnswers, setQuizAnswers] = useState({});
  const [showQuizResults, setShowQuizResults] = useState(false);

  const questions = useMemo(() => {
    const verbs = tense.verbs.filter(v => !v.inf.startsWith("Structure"));
    const qs = verbs.map((v, vi) => {
      const pi = Math.floor(Math.random() * pronouns.length);
      return { verb: v, pronoun: pronouns[pi], pronounLabel: pronounLabels[pi], vi, pi };
    });
    for (let i = qs.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [qs[i], qs[j]] = [qs[j], qs[i]]; }
    return qs;
  }, [tense]);

  const normalize = (s) => s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");
  const score = showQuizResults ? questions.filter((q, i) => {
    return normalize(quizAnswers[i] || "") === normalize(q.verb[q.pronoun]);
  }).length : 0;

  useEffect(() => { if (showQuizResults) stats.record("verbs", "type", score, questions.length, tense.name); }, [showQuizResults]);

  return (
    <div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#94a3b8", marginBottom: 16 }}>
        Fill in the correct conjugation for each verb and pronoun:
      </div>
      {questions.map((q, i) => {
        const correct = q.verb[q.pronoun];
        const answer = (quizAnswers[i] || "").trim().toLowerCase();
        const isCorrect = showQuizResults && answer === correct.toLowerCase();
        const isWrong = showQuizResults && answer !== correct.toLowerCase();
        return (
          <div key={i} style={{
            padding: "14px 16px",
            borderRadius: 10,
            background: showQuizResults ? (isCorrect ? "rgba(52,211,153,0.06)" : "rgba(239,68,68,0.06)") : "#111827",
            border: `1px solid ${showQuizResults ? (isCorrect ? "rgba(52,211,153,0.3)" : "rgba(239,68,68,0.3)") : "rgba(51,65,85,0.4)"}`,
            marginBottom: 8,
          }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#cbd5e1", marginBottom: 8 }}>
              <strong style={{ color: tense.color }}>{q.verb.inf}</strong> — <em>{q.pronounLabel}</em>
            </div>
            <input
              value={quizAnswers[i] || ""}
              onChange={e => setQuizAnswers(prev => ({ ...prev, [i]: e.target.value }))}
              disabled={showQuizResults}
              placeholder="Type conjugation…"
              style={{
                width: "100%",
                padding: "8px 12px",
                borderRadius: 6,
                border: `1px solid ${showQuizResults ? (isCorrect ? "#34d399" : "#ef4444") : "rgba(99,102,241,0.2)"}`,
                background: "rgba(0,0,0,0.2)",
                color: "#e2e8f0",
                fontSize: 14,
                fontFamily: "'Libre Baskerville', serif",
                outline: "none",
                boxSizing: "border-box",
              }}
            />
            {isWrong && (
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#f87171", marginTop: 6 }}>
                Correct: <strong style={{ color: "#34d399" }}>{correct}</strong>
              </div>
            )}
          </div>
        );
      })}
      {!showQuizResults ? (
        <button onClick={() => setShowQuizResults(true)} style={{
          width: "100%", padding: "14px", borderRadius: 10, border: "none", marginTop: 8,
          background: `linear-gradient(135deg, ${tense.color}, ${tense.color}bb)`,
          color: "#fff", fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, cursor: "pointer",
        }}>Check Answers</button>
      ) : (
        <div style={{
          textAlign: "center", padding: "16px", borderRadius: 10,
          background: "rgba(99,102,241,0.06)", border: "1px solid rgba(99,102,241,0.2)", marginTop: 8,
        }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: score === questions.length ? "#34d399" : "#a5b4fc" }}>
            {score}/{questions.length}
          </div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 4 }}>
            {score === questions.length ? "Perfect! 🎉" : "Keep practicing!"}
          </div>
          <button onClick={() => { setQuizAnswers({}); setShowQuizResults(false); }} style={{
            width: "100%", padding: "14px", borderRadius: 10, border: `1.5px solid ${tense.color}40`,
            background: "transparent", color: tense.color, marginTop: 12, cursor: "pointer",
            fontSize: 14, fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
          }}>New Round</button>
        </div>
      )}
    </div>
  );
}

function TenseMatch({ tense, pronouns, pronounLabels }) {
  const pairs = useMemo(() => {
    const verbs = tense.verbs.filter(v => !v.inf.startsWith("Structure"));
    return verbs.map((v, i) => {
      const pi = Math.floor(Math.random() * pronouns.length);
      return { id: `t-${i}`, left: `${v.inf.split(" (")[0]} — ${pronounLabels[pi]}`, right: v[pronouns[pi]] };
    });
  }, [tense]);
  return <RollingMatch key={`tm-${tense.name}`} allPairs={pairs} category="verbs" detail={tense.name} color={tense.color} leftLabel="Verb + Pronoun" rightLabel="Conjugation" />;
}

function CultureRecall({ culture, activeTheme }) {
  const stats = useStats();
  const cards = useMemo(() => {
    const c = culture.facts.map((f, i) => ({ title: f.title, detail: f.detail, useful: f.useful, id: i }));
    for (let i = c.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [c[i], c[j]] = [c[j], c[i]]; }
    return c;
  }, [activeTheme]);

  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showFr, setShowFr] = useState(false); // false = show topic, recall FR; true = show FR, recall topic
  const [score, setScore] = useState({ yes: 0, no: 0 });

  const card = cards[index];
  const done = score.yes + score.no >= cards.length;

  useEffect(() => { if (done) { SFX.complete(); stats.record("culture", "recall", score.yes, cards.length, activeTheme); } }, [done]);

  const mark = (correct) => {
    if (correct) SFX.correct(); else SFX.wrong();
    setScore(s => ({ ...s, [correct ? "yes" : "no"]: s[correct ? "yes" : "no"] + 1 }));
    setFlipped(false);
    if (index + 1 < cards.length) setIndex(index + 1);
  };
  const restart = () => { setIndex(0); setFlipped(false); setScore({ yes: 0, no: 0 }); };

  if (done) return (
    <div style={{ textAlign: "center", padding: "40px 20px", borderRadius: 16, background: "#111827", border: "1px solid rgba(51,65,85,0.4)" }}>
      <div style={{ fontSize: 40, marginBottom: 12 }}>{score.yes > score.no ? "🎉" : "💪"}</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 700, color: "#e2e8f0" }}>{score.yes}/{cards.length}</div>
      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#64748b", marginTop: 8, marginBottom: 20 }}>
        {score.yes === cards.length ? "You know your Francophone culture!" : "Review and try again!"}
      </div>
      <button onClick={restart} style={{
        padding: "12px 28px", borderRadius: 10, border: "none", cursor: "pointer",
        background: `linear-gradient(135deg, ${culture.color}, ${culture.color}bb)`, color: "#fff",
        fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700,
      }}>Try Again</button>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <button onClick={() => { setShowFr(!showFr); setFlipped(false); }} style={{
          padding: "6px 14px", borderRadius: 8, border: "1px solid rgba(99,102,241,0.3)",
          background: "rgba(99,102,241,0.08)", color: "#a5b4fc",
          fontSize: 12, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, cursor: "pointer",
        }}>{showFr ? "See FR → recall topic" : "See topic → recall FR"}</button>
        <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{index + 1}/{cards.length}</span>
      </div>
      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        <div style={{ flex: score.yes, height: 4, borderRadius: 2, background: "#34d399", transition: "flex 0.3s" }} />
        <div style={{ flex: score.no, height: 4, borderRadius: 2, background: "#f87171", transition: "flex 0.3s" }} />
        <div style={{ flex: Math.max(0, cards.length - score.yes - score.no), height: 4, borderRadius: 2, background: "#1e293b" }} />
      </div>
      <div onClick={() => { setFlipped(!flipped); SFX.flip(); }} style={{
        minHeight: 200, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
        padding: "36px 24px", borderRadius: 16, cursor: "pointer", textAlign: "center", transition: "all 0.3s",
        background: flipped ? `${culture.color}08` : "linear-gradient(145deg, #1e293b, #111827)",
        border: `1.5px solid ${flipped ? `${culture.color}40` : "rgba(51,65,85,0.5)"}`,
      }}>
        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", color: "#64748b", marginBottom: 14 }}>
          {flipped ? "French sentence to use" : "Cultural topic"} · {index + 1}/{cards.length}
        </div>
        {!flipped ? (
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>{card.title}</div>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#64748b", maxWidth: 400 }}>{card.detail.slice(0, 100)}…</div>
          </div>
        ) : (
          <div style={{ fontSize: 16, fontWeight: 700, color: culture.color, fontStyle: "italic", lineHeight: 1.6 }}>{card.useful}</div>
        )}
        {!flipped && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#475569", marginTop: 16 }}>Tap or Space to flip · 1/2 to answer</div>}
      </div>
      {flipped && (
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <button onClick={() => mark(false)} style={{

            background: "#111827", color: "#f87171", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer",
